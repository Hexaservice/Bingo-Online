name: Deploy by branch to Firebase Hosting

on:
  push:
    branches: [dev, stg, main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    env:
      DEPLOY_ENV: dev
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_DEV != '' &&
        secrets.FIREBASE_DEV_API_KEY != '' &&
        secrets.FIREBASE_DEV_AUTH_DOMAIN != '' &&
        secrets.FIREBASE_DEV_DATABASE_URL != '' &&
        secrets.FIREBASE_DEV_PROJECT_ID != '' &&
        secrets.FIREBASE_DEV_STORAGE_BUCKET != '' &&
        secrets.FIREBASE_DEV_MESSAGING_SENDER_ID != '' &&
        secrets.FIREBASE_DEV_APP_ID != '' }}
      FIREBASE_DEV_API_KEY: ${{ secrets.FIREBASE_DEV_API_KEY }}
      FIREBASE_DEV_AUTH_DOMAIN: ${{ secrets.FIREBASE_DEV_AUTH_DOMAIN }}
      FIREBASE_DEV_DATABASE_URL: ${{ secrets.FIREBASE_DEV_DATABASE_URL }}
      FIREBASE_DEV_PROJECT_ID: ${{ secrets.FIREBASE_DEV_PROJECT_ID }}
      FIREBASE_DEV_STORAGE_BUCKET: ${{ secrets.FIREBASE_DEV_STORAGE_BUCKET }}
      FIREBASE_DEV_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_DEV_MESSAGING_SENDER_ID }}
      FIREBASE_DEV_APP_ID: ${{ secrets.FIREBASE_DEV_APP_ID }}
    steps:
      - name: Aviso por falta de credenciales
        if: env.HAS_FIREBASE_SECRETS != 'true'
        run: |
          echo "::warning::No se encontraron todas las credenciales de Firebase necesarias para dev."
          echo "::warning::Se omite el despliegue automático para la rama dev."

      - uses: actions/checkout@v4
        if: env.HAS_FIREBASE_SECRETS == 'true'

      - name: Validar configuración Firebase (dev)
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: |
          set -euo pipefail

          [[ "${FIREBASE_DEV_PROJECT_ID}" == "bingo-online-dev" ]] || {
            echo "ERROR: FIREBASE_DEV_PROJECT_ID debe ser bingo-online-dev y llegó '${FIREBASE_DEV_PROJECT_ID}'."
            exit 1
          }

          [[ "${FIREBASE_DEV_AUTH_DOMAIN}" =~ ^bingo-online-dev\.(web\.app|firebaseapp\.com)$ ]] || {
            echo "ERROR: FIREBASE_DEV_AUTH_DOMAIN inválido ('${FIREBASE_DEV_AUTH_DOMAIN}'). Permitidos: bingo-online-dev.web.app o bingo-online-dev.firebaseapp.com."
            exit 1
          }

          [[ "${FIREBASE_DEV_DATABASE_URL}" == "https://bingo-online-dev-default-rtdb.firebaseio.com" ]] || {
            echo "ERROR: FIREBASE_DEV_DATABASE_URL debe usar la base default del proyecto (https://bingo-online-dev-default-rtdb.firebaseio.com)."
            exit 1
          }

      - name: Generar firebase-config.js
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: node scripts/generateFirebaseConfig.js --env "${DEPLOY_ENV}"

      - name: Deploy to Firebase Hosting
        if: env.HAS_FIREBASE_SECRETS == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_DEV }}
          projectId: bingo-online-dev
          target: dev
          channelId: live

  deploy-stg:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stg'
    env:
      DEPLOY_ENV: stg
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_STG != '' &&
        secrets.FIREBASE_STG_API_KEY != '' &&
        secrets.FIREBASE_STG_AUTH_DOMAIN != '' &&
        secrets.FIREBASE_STG_DATABASE_URL != '' &&
        secrets.FIREBASE_STG_PROJECT_ID != '' &&
        secrets.FIREBASE_STG_STORAGE_BUCKET != '' &&
        secrets.FIREBASE_STG_MESSAGING_SENDER_ID != '' &&
        secrets.FIREBASE_STG_APP_ID != '' }}
      FIREBASE_STG_API_KEY: ${{ secrets.FIREBASE_STG_API_KEY }}
      FIREBASE_STG_AUTH_DOMAIN: ${{ secrets.FIREBASE_STG_AUTH_DOMAIN }}
      FIREBASE_STG_DATABASE_URL: ${{ secrets.FIREBASE_STG_DATABASE_URL }}
      FIREBASE_STG_PROJECT_ID: ${{ secrets.FIREBASE_STG_PROJECT_ID }}
      FIREBASE_STG_STORAGE_BUCKET: ${{ secrets.FIREBASE_STG_STORAGE_BUCKET }}
      FIREBASE_STG_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_STG_MESSAGING_SENDER_ID }}
      FIREBASE_STG_APP_ID: ${{ secrets.FIREBASE_STG_APP_ID }}
    steps:
      - name: Aviso por falta de credenciales
        if: env.HAS_FIREBASE_SECRETS != 'true'
        run: |
          echo "::warning::No se encontraron todas las credenciales de Firebase necesarias para stg."
          echo "::warning::Se omite el despliegue automático para la rama stg."

      - uses: actions/checkout@v4
        if: env.HAS_FIREBASE_SECRETS == 'true'

      - name: Validar configuración Firebase (stg)
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: |
          set -euo pipefail

          [[ "${FIREBASE_STG_PROJECT_ID}" == "bingo-online-stg" ]] || {
            echo "ERROR: FIREBASE_STG_PROJECT_ID debe ser bingo-online-stg y llegó '${FIREBASE_STG_PROJECT_ID}'."
            exit 1
          }

          [[ "${FIREBASE_STG_AUTH_DOMAIN}" =~ ^bingo-online-stg\.(web\.app|firebaseapp\.com)$ ]] || {
            echo "ERROR: FIREBASE_STG_AUTH_DOMAIN inválido ('${FIREBASE_STG_AUTH_DOMAIN}'). Permitidos: bingo-online-stg.web.app o bingo-online-stg.firebaseapp.com."
            exit 1
          }

          [[ "${FIREBASE_STG_DATABASE_URL}" == "https://bingo-online-stg-default-rtdb.firebaseio.com" ]] || {
            echo "ERROR: FIREBASE_STG_DATABASE_URL debe usar la base default del proyecto (https://bingo-online-stg-default-rtdb.firebaseio.com)."
            exit 1
          }

      - name: Generar firebase-config.js
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: node scripts/generateFirebaseConfig.js --env "${DEPLOY_ENV}"

      - name: Deploy to Firebase Hosting
        if: env.HAS_FIREBASE_SECRETS == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_STG }}
          projectId: bingo-online-stg
          target: stg
          channelId: live

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_ENV: prod
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_231FD != '' &&
        secrets.FIREBASE_MAIN_API_KEY != '' &&
        secrets.FIREBASE_MAIN_AUTH_DOMAIN != '' &&
        secrets.FIREBASE_MAIN_DATABASE_URL != '' &&
        secrets.FIREBASE_MAIN_PROJECT_ID != '' &&
        secrets.FIREBASE_MAIN_STORAGE_BUCKET != '' &&
        secrets.FIREBASE_MAIN_MESSAGING_SENDER_ID != '' &&
        secrets.FIREBASE_MAIN_APP_ID != '' }}
      FIREBASE_MAIN_API_KEY: ${{ secrets.FIREBASE_MAIN_API_KEY }}
      FIREBASE_MAIN_AUTH_DOMAIN: ${{ secrets.FIREBASE_MAIN_AUTH_DOMAIN }}
      FIREBASE_MAIN_DATABASE_URL: ${{ secrets.FIREBASE_MAIN_DATABASE_URL }}
      FIREBASE_MAIN_PROJECT_ID: ${{ secrets.FIREBASE_MAIN_PROJECT_ID }}
      FIREBASE_MAIN_STORAGE_BUCKET: ${{ secrets.FIREBASE_MAIN_STORAGE_BUCKET }}
      FIREBASE_MAIN_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MAIN_MESSAGING_SENDER_ID }}
      FIREBASE_MAIN_APP_ID: ${{ secrets.FIREBASE_MAIN_APP_ID }}
    steps:
      - name: Aviso por falta de credenciales
        if: env.HAS_FIREBASE_SECRETS != 'true'
        run: |
          echo "::warning::No se encontraron todas las credenciales de Firebase necesarias para producción."
          echo "::warning::Se omite el despliegue automático para la rama main."

      - uses: actions/checkout@v4
        if: env.HAS_FIREBASE_SECRETS == 'true'

      - name: Validar configuración Firebase (main/prod)
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: |
          set -euo pipefail

          [[ "${FIREBASE_MAIN_PROJECT_ID}" == "bingo-online-231fd" ]] || {
            echo "ERROR: FIREBASE_MAIN_PROJECT_ID debe ser bingo-online-231fd y llegó '${FIREBASE_MAIN_PROJECT_ID}'."
            exit 1
          }

          [[ "${FIREBASE_MAIN_AUTH_DOMAIN}" =~ ^bingo-online-231fd\.(web\.app|firebaseapp\.com)$ ]] || {
            echo "ERROR: FIREBASE_MAIN_AUTH_DOMAIN inválido ('${FIREBASE_MAIN_AUTH_DOMAIN}'). Permitidos: bingo-online-231fd.web.app o bingo-online-231fd.firebaseapp.com."
            exit 1
          }

          [[ "${FIREBASE_MAIN_DATABASE_URL}" == "https://bingo-online-231fd-default-rtdb.firebaseio.com" ]] || {
            echo "ERROR: FIREBASE_MAIN_DATABASE_URL debe usar la base default del proyecto (https://bingo-online-231fd-default-rtdb.firebaseio.com)."
            exit 1
          }

      - name: Generar firebase-config.js
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: node scripts/generateFirebaseConfig.js --env "${DEPLOY_ENV}"

      - name: Deploy to Firebase Hosting
        if: env.HAS_FIREBASE_SECRETS == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_231FD }}
          projectId: bingo-online-231fd
          target: main
          channelId: live
