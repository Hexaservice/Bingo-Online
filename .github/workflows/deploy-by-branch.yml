name: Deploy by branch to Firebase Hosting

on:
  push:
    branches: [dev, staging, main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    env:
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_DEV != '' &&
        secrets.FIREBASE_DEV_WEB_API_KEY != '' &&
        secrets.FIREBASE_DEV_AUTH_DOMAIN != '' &&
        secrets.FIREBASE_DEV_DATABASE_URL != '' &&
        secrets.FIREBASE_DEV_PROJECT_ID != '' &&
        secrets.FIREBASE_DEV_STORAGE_BUCKET != '' &&
        secrets.FIREBASE_DEV_MESSAGING_SENDER_ID != '' &&
        secrets.FIREBASE_DEV_APP_ID != '' }}
    steps:
      - name: Aviso por falta de credenciales
        if: env.HAS_FIREBASE_SECRETS != 'true'
        run: |
          echo "::warning::No se encontraron todas las credenciales de Firebase necesarias."
          echo "::warning::Se omite el despliegue automático para la rama dev."

      - uses: actions/checkout@v4
        if: env.HAS_FIREBASE_SECRETS == 'true'

      - name: Validar configuración esperada para dev
        if: env.HAS_FIREBASE_SECRETS == 'true'
        env:
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_DEV_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DEV_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_DEV_PROJECT_ID }}
        run: |
          set -euo pipefail
          echo "Validando configuración Firebase para rama dev"
          echo "projectId=${FIREBASE_PROJECT_ID}"
          echo "authDomain=${FIREBASE_AUTH_DOMAIN}"
          echo "databaseURL=${FIREBASE_DATABASE_URL}"

          [[ "${FIREBASE_PROJECT_ID}" == "bingo-online-dev" ]] || { echo "::error::FIREBASE_DEV_PROJECT_ID debe ser bingo-online-dev"; exit 1; }
          [[ "${FIREBASE_AUTH_DOMAIN}" == "bingo-online-dev.firebaseapp.com" ]] || { echo "::error::FIREBASE_DEV_AUTH_DOMAIN debe ser bingo-online-dev.firebaseapp.com"; exit 1; }
          [[ "${FIREBASE_DATABASE_URL}" == "https://bingo-online-dev-default-rtdb.firebaseio.com" ]] || { echo "::error::FIREBASE_DEV_DATABASE_URL debe apuntar a bingo-online-dev"; exit 1; }

      - name: Generar firebase-config.js
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: |
          set -euo pipefail
          npm ci
          npm run generate:firebase-config
        env:
          FIREBASE_ENV_FILE: .env.dev.ci
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_DEV_WEB_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_DEV_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DEV_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_DEV_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_DEV_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_DEV_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_DEV_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_DEV_MEASUREMENT_ID }}

      - name: Deploy to Firebase Hosting
        if: env.HAS_FIREBASE_SECRETS == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_DEV }}
          projectId: bingo-online-dev
          target: dev
          channelId: live

  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    env:
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_231FD != '' &&
        secrets.FIREBASE_WEB_API_KEY != '' &&
        secrets.FIREBASE_AUTH_DOMAIN != '' &&
        secrets.FIREBASE_DATABASE_URL != '' &&
        secrets.FIREBASE_PROJECT_ID != '' &&
        secrets.FIREBASE_STORAGE_BUCKET != '' &&
        secrets.FIREBASE_MESSAGING_SENDER_ID != '' &&
        secrets.FIREBASE_APP_ID != '' }}
    steps:
      - name: Aviso por falta de credenciales
        if: env.HAS_FIREBASE_SECRETS != 'true'
        run: |
          echo "::warning::No se encontraron todas las credenciales de Firebase necesarias."
          echo "::warning::Se omite el despliegue automático para la rama staging."

      - uses: actions/checkout@v4
        if: env.HAS_FIREBASE_SECRETS == 'true'

      - name: Generar firebase-config.js
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: |
          set -euo pipefail
          cp public/firebase-config.template.js public/firebase-config.js
          sed -i "s|__FIREBASE_API_KEY__|${FIREBASE_API_KEY}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_AUTH_DOMAIN__|${FIREBASE_AUTH_DOMAIN}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_DATABASE_URL__|${FIREBASE_DATABASE_URL}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_PROJECT_ID__|${FIREBASE_PROJECT_ID}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${FIREBASE_STORAGE_BUCKET}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${FIREBASE_MESSAGING_SENDER_ID}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_APP_ID__|${FIREBASE_APP_ID}|g" public/firebase-config.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        if: env.HAS_FIREBASE_SECRETS == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_231FD }}
          projectId: bingo-online-231fd
          target: stg
          channelId: live

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_231FD != '' &&
        secrets.FIREBASE_WEB_API_KEY != '' &&
        secrets.FIREBASE_AUTH_DOMAIN != '' &&
        secrets.FIREBASE_DATABASE_URL != '' &&
        secrets.FIREBASE_PROJECT_ID != '' &&
        secrets.FIREBASE_STORAGE_BUCKET != '' &&
        secrets.FIREBASE_MESSAGING_SENDER_ID != '' &&
        secrets.FIREBASE_APP_ID != '' }}
    steps:
      - name: Aviso por falta de credenciales
        if: env.HAS_FIREBASE_SECRETS != 'true'
        run: |
          echo "::warning::No se encontraron todas las credenciales de Firebase necesarias."
          echo "::warning::Se omite el despliegue automático para la rama main."

      - uses: actions/checkout@v4
        if: env.HAS_FIREBASE_SECRETS == 'true'

      - name: Generar firebase-config.js
        if: env.HAS_FIREBASE_SECRETS == 'true'
        run: |
          set -euo pipefail
          cp public/firebase-config.template.js public/firebase-config.js
          sed -i "s|__FIREBASE_API_KEY__|${FIREBASE_API_KEY}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_AUTH_DOMAIN__|${FIREBASE_AUTH_DOMAIN}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_DATABASE_URL__|${FIREBASE_DATABASE_URL}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_PROJECT_ID__|${FIREBASE_PROJECT_ID}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${FIREBASE_STORAGE_BUCKET}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${FIREBASE_MESSAGING_SENDER_ID}|g" public/firebase-config.js
          sed -i "s|__FIREBASE_APP_ID__|${FIREBASE_APP_ID}|g" public/firebase-config.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        if: env.HAS_FIREBASE_SECRETS == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BINGO_ONLINE_231FD }}
          projectId: bingo-online-231fd
          target: prod
          channelId: live
