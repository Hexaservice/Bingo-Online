<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Pagos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: only light; }
    body {
      background: linear-gradient(rgba(255,255,255,0.7),rgba(255,255,255,0.7)),
        url('https://img.freepik.com/vectores-premium/padrao-sem-costura-com-simbolos-de-dolar-e-porcentagem_637741-777.jpg');
      background-repeat: repeat;
      text-align: center;
      font-family: 'Bangers', cursive;
      padding: 5px;
      margin: 0;
    }
    .menu-btn {
      width: 120px;
      height: 40px;
      background: orange;
      border: 4px solid #FFD700;
      border-radius: 10px;
      color: #fff;
      text-shadow: 2px 2px 4px #000;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .back-btn {
      position: fixed;
      top: 5px;
      left: 5px;
      font-family: 'Bangers', cursive;
      font-size: 1.2rem;
      text-transform: uppercase;
    }
    h2.titulo-principal {
      margin: 15px 0 10px;
      color: #ffeb3b;
      text-shadow: 0 0 6px rgba(0,0,0,0.85);
      letter-spacing: 1px;
    }
    .section {
      margin: 12px auto;
      max-width: 1280px;
      background: rgba(255,255,255,0.4);
      border-radius: 12px;
      padding: 6px 8px 12px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 5px;
      background: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .switch-label {
      font-family: Calibri, Arial, sans-serif;
      font-size: 0.8rem;
      color: #000;
    }
    #premios-section {
      color: #0ca750;
    }
    #premios-section h3 {
      margin: 0;
      color: #1fa74a;
      text-shadow: 0 0 4px rgba(0,0,0,0.6);
      font-size: 1.4rem;
    }
    #premios-section .icon-btn,
    #premios-section .switch-label {
      color: #1c7b43;
    }
    #premios-section table th,
    #premios-section table td {
      color: #176437;
    }
    #pagos-section {
      color: #d97814;
    }
    #pagos-section h3 {
      margin: 0;
      color: #b85c00;
      text-shadow: 0 0 4px rgba(0,0,0,0.6);
      font-size: 1.4rem;
    }
    #pagos-section .icon-btn,
    #pagos-section .switch-label {
      color: #8d4800;
    }
    #pagos-section table th,
    #pagos-section table td {
      color: #7a3f00;
    }
    #colaboradores-section {
      color: #6a1b9a;
    }
    #colaboradores-section h3 {
      margin: 0;
      color: #4a148c;
      text-shadow: 0 0 4px rgba(0,0,0,0.6);
      font-size: 1.4rem;
    }
    #colaboradores-section .icon-btn,
    #colaboradores-section .switch-label {
      color: #4a148c;
    }
    #colaboradores-section table th,
    #colaboradores-section table td {
      color: #4a148c;
    }
    #tabla-colaboradores .colab-input {
      width: 100%;
      box-sizing: border-box;
      border: none;
      background: transparent;
      font-family: inherit;
      font-weight: bold;
      color: #4a148c;
      text-align: right;
    }
    #tabla-colaboradores .colab-input:disabled {
      color: inherit;
    }
    .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
    .switch input { display: none; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #4caf50; }
    input:checked + .slider:before { transform: translateX(18px); }
    .acciones {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 4px 0;
      margin: 0;
    }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      margin: 0 2px;
      cursor: pointer;
      background: rgba(255,255,255,0.9);
      font-family: Calibri, Arial, sans-serif;
      font-weight: bold;
    }
    .icon-btn .icon.check { color: green; }
    .icon-btn .icon.edit { color: blue; }
    .icon-only { padding: 4px; width: 24px; height: 24px; justify-content: center; gap: 0; }
    .archivo-activo { background: #654321; color: #fff; }
    table {
      margin: 5px auto;
      border-collapse: collapse;
      width: 100%;
      font-size: 0.8rem;
      font-family: Calibri, Arial, sans-serif;
      background: rgba(255,255,255,0.6);
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 2px;
      white-space: nowrap;
      font-weight: bold;
    }
    #tabla-premios th:nth-child(2), #tabla-premios td:nth-child(2),
    #tabla-premios th:nth-child(3), #tabla-premios td:nth-child(3),
    #tabla-premios th:nth-child(4), #tabla-premios td:nth-child(4),
    #tabla-premios th:nth-child(5), #tabla-premios td:nth-child(5),
    #tabla-pagos th:nth-child(2), #tabla-pagos td:nth-child(2),
    #tabla-pagos th:nth-child(3), #tabla-pagos td:nth-child(3),
    #tabla-pagos th:nth-child(4), #tabla-pagos td:nth-child(4) {
      white-space: normal;
      word-break: break-word;
    }
    thead tr:first-child th { position: sticky; top: 40px; background: rgba(255,255,255,0.85); z-index: 2; }
    tbody tr { background: rgba(255,255,255,0.95); }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 25px;
      height: 25px;
      background: red;
      color: #fff;
      border-radius: 50%;
      font-size: 0.9rem;
      animation: pulse 1s infinite;
    }
    .badge.oculto { display: none; }
    .filtros input,
    .filtros select {
      width: 100%;
      box-sizing: border-box;
      font-family: Calibri, Arial, sans-serif;
      font-size: 0.8rem;
    }
    .acciones-top {
      max-width: 1280px;
      margin: 0 auto 4px;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }
    .btn-pagos-pendientes {
      font-size: 0.65rem;
      padding: 3px 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: #1a5e20;
      color: #fff;
      border: 1px solid #0f3c13;
      border-radius: 4px;
      font-family: Calibri, Arial, sans-serif;
      cursor: pointer;
    }
    .btn-pagos-pendientes:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .filtros th:first-child { text-align: center; }
    .check-header {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
    }
    .estado-pendiente { color: orange; }
    .estado-aprobado { color: green; }
    .estado-archivado { color: brown; }
    .mensaje-tabla {
      padding: 12px;
      text-align: center;
      font-family: Calibri, Arial, sans-serif;
      font-size: 0.95rem;
      color: #0d47a1;
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      border: 1px dashed rgba(13,71,161,0.3);
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @media (orientation: portrait) {
      body { padding: 2px; }
      table { font-size: 0.6rem; width: 100%; margin: 2px 0; }
      .acciones { margin: 2px 0; }
      .section-header { margin-bottom: 2px; }
      #premios-content,
      #pagos-content { max-height: 70vh; overflow: auto; }
      #volver-btn { width: 40px; }
      #volver-btn .label { display: none; }
    }
    @media (orientation: landscape) { table { font-size: 0.9rem; } }
  </style>
</head>
<body>
  <button id="volver-btn" class="menu-btn back-btn" data-compact-back="true"><span class="icon">&#9664;</span><span class="label">Volver</span></button>
  <h2 class="titulo-principal">APROBACIÓN DE PAGOS</h2>
  <div class="acciones-top">

  <section class="section" id="pagos-section">
    <div class="section-header">

      <div class="header-controls">

    <div id="pagos-content">

        <button class="icon-btn" id="pagos-archivar"><span class="icon">&#128194;</span><span>Archivar</span></button>
        <button class="icon-btn" id="pagos-ver-archivo"><span class="icon">&#128230;</span><span>Archivo</span></button>
      </div>

        <colgroup>
          <col style="width:6%">

          <col style="width:16%">
          <col style="width:12%">
          <col style="width:4%">
        </colgroup>
        <thead>
          <tr class="filtros">
            <th>N°</th>
            <th><input type="text" id="filtro-pagos-gmail" placeholder="Gmail"></th>
            <th><input type="text" id="filtro-pagos-nombre" placeholder="Nombre"></th>
            <th><input type="text" id="filtro-pagos-creditos" placeholder="Créditos"></th>
            <th><input type="date" id="filtro-pagos-fecha"></th>
            <th>
              <select id="filtro-pagos-estado">
                <option value="">Estado</option>

  <section class="section" id="colaboradores-section">
    <div class="section-header">
      <h3>PAGOS COLABORADORES</h3>

        <span id="badge-colaboradores" class="badge oculto">0</span>
        <label class="switch"><input type="checkbox" id="toggle-colaboradores"><span class="slider"></span></label>
      </div>
    </div>
    <div id="colaboradores-content">
      <div class="acciones">
        <button class="icon-btn" id="colaboradores-aprobar"><span class="icon check">&#10004;</span><span>Aprobar</span></button>
        <button class="icon-btn" id="colaboradores-archivar"><span class="icon">&#128194;</span><span>Archivar</span></button>
        <button class="icon-btn" id="colaboradores-ver-archivo"><span class="icon">&#128230;</span><span>Archivo</span></button>
      </div>
      <table id="tabla-colaboradores">

        </colgroup>
        <thead>
          <tr class="filtros">
            <th>N°</th>
            <th><input type="text" id="filtro-colab-gmail" placeholder="Gmail"></th>
            <th><input type="text" id="filtro-colab-nombre" placeholder="Nombre"></th>
            <th><input type="text" id="filtro-colab-creditos" placeholder="Créditos"></th>
            <th><input type="date" id="filtro-colab-fecha"></th>
            <th>
              <select id="filtro-colab-estado">
                <option value="">Estado</option>
                <option value="PENDIENTE">Pendiente</option>
                <option value="APROBADO">Aprobado</option>
              </select>
            </th>
            <th><span id="colaboradores-marcar" class="check-header">✔</span></th>

  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/timezone.js"></script>
  <script>
    ensureAuth('Administrador');
    initServerTime();

    const dbRef = ()=>firebase.firestore();
    const authInstance = ()=>firebase.auth();

    const filtrosPremios = { gmail:'', alias:'', creditos:'', cartones:'', fecha:'', estado:'' };
    const filtrosPagos = { gmail:'', nombre:'', creditos:'', fecha:'', estado:'' };
    const filtrosColaboradores = { gmail:'', nombre:'', creditos:'', fecha:'', estado:'' };

    let mostrarPremiosArchivo = false;
    let mostrarPagosArchivo = false;
    let mostrarColaboradoresArchivo = false;

    const premiosActivos = [];
    const premiosArchivados = [];
    const pagosAdminActivos = [];
    const pagosAdminArchivados = [];
    const pagosColaboradoresActivos = [];
    const pagosColaboradoresArchivados = [];
    const premiosMapa = new Map();
    const premiosArchivoMapa = new Map();
    const pagosAdminMapa = new Map();
    const pagosAdminArchivoMapa = new Map();
    const pagosColaboradoresMapa = new Map();
    const pagosColaboradoresArchivoMapa = new Map();
    const pagosColaboradoresEdicion = new Map();

    let unsubscribePremios = null;
    let unsubscribePremiosArchivo = null;
    let unsubscribePagos = null;
    let unsubscribePagosArchivo = null;
    let unsubscribeColaboradores = null;
    let unsubscribeColaboradoresArchivo = null;

    const formatNumber = new Intl.NumberFormat('es-ES', { maximumFractionDigits: 2, minimumFractionDigits: 0 });
    let firebaseReadyPromiseCentro = null;

    function ensureFirebaseListo(){
      if(firebaseReadyPromiseCentro) return firebaseReadyPromiseCentro;
      if(typeof initFirebase !== 'function'){
        firebaseReadyPromiseCentro = Promise.resolve();
        return firebaseReadyPromiseCentro;
      }
      firebaseReadyPromiseCentro = initFirebase().catch(err=>{
        console.error('No se pudo inicializar Firebase', err);
        throw err;
      });
      return firebaseReadyPromiseCentro;
    }

    function cpNormalizarNumero(valor){
      if(typeof valor === 'number' && Number.isFinite(valor)) return valor;
      if(typeof valor === 'string'){
        const texto = valor.trim();
        if(!texto) return null;
        const match = texto.toUpperCase().match(/^([BINGO])[-\s]?0*(\d{1,2})$/);
        if(match){
          const numero = parseInt(match[2],10);
          return Number.isFinite(numero) ? numero : null;
        }
        const numeroPlano = parseInt(texto,10);
        if(Number.isFinite(numeroPlano)) return numeroPlano;
      }
      return null;
    }

    function cpNormalizarPosicionesEntrada(posiciones){
      const lista = Array.isArray(posiciones) ? posiciones : [];
      const resultado = [];
      lista.forEach(pos=>{
        if(!pos) return;
        const fila = Number(pos?.r ?? pos?.row ?? pos?.fila);
        const col = Number(pos?.c ?? pos?.col ?? pos?.columna);
        const valor = cpNormalizarNumero(pos?.valor ?? pos?.numero ?? pos?.value);
        if(Number.isInteger(fila) && Number.isInteger(col)){
          resultado.push({ r: fila, c: col, valor: valor ?? null });
        }
      });
      return resultado;
    }

    function cpNormalizarEmail(valor){
      if(typeof valor !== 'string') return '';
      return valor.trim().toLowerCase();
    }

    function cpSanitizarId(valor){
      const texto = (valor || '').toString();
      const limpio = texto.normalize('NFKD').replace(/[\u0300-\u036f]/g,'');
      const reemplazado = limpio.replace(/[^a-zA-Z0-9_-]+/g,'_');
      return reemplazado.replace(/_{2,}/g,'_').replace(/^_+|_+$/g,'') || 'registro';
    }

    function cpCrearContextoSorteo(sorteoId, sorteoData){
      return {
        sorteoId,
        sorteoData: sorteoData || {},
        db: dbRef(),
        formasData: [],
        cartonesMapa: new Map(),
        cartonesGanadoresPorForma: new Map(),
        formasPorCarton: new Map(),
        cantosOrdenados: [],
        cantosIndiceMap: new Map(),
        cantosResultadoMap: new Map(),
        usuariosCache: {
          porUserId: new Map(),
          porAlias: new Map(),
          porEmail: new Map()
        }
      };
    }

    function cpAlmacenarUsuarioEnCaches(ctx, info){
      if(!ctx || !info) return;
      const emailNorm = cpNormalizarEmail(info.email);
      if(emailNorm && !ctx.usuariosCache.porEmail.has(emailNorm)){
        ctx.usuariosCache.porEmail.set(emailNorm, info);
      }
      if(info.uid && !ctx.usuariosCache.porUserId.has(info.uid)){
        ctx.usuariosCache.porUserId.set(info.uid, info);
      }
      if(info.alias){
        const aliasClave = info.alias.toLowerCase();
        if(!ctx.usuariosCache.porAlias.has(aliasClave)){
          ctx.usuariosCache.porAlias.set(aliasClave, info);
        }
      }
    }

    function cpNormalizarInfoUsuario(id, data = {}){
      const email = (data.email || id || '').toString();
      let nombre = (data.nombre || data.name || '').toString().trim();
      const apellido = (data.apellido || data.lastName || '').toString().trim();
      if(!nombre && (data.name || data.apellido)){
        nombre = [data.name, data.apellido].filter(Boolean).join(' ').trim();
      } else if(nombre && apellido && !nombre.toLowerCase().includes(apellido.toLowerCase())){
        nombre = `${nombre} ${apellido}`.trim();
      }
      const alias = (data.alias || data.aliasJugador || data.aliascarton || '').toString();
      const uid = (data.uid || data.userId || data.id || '').toString();
      return {
        email,
        alias,
        nombre,
        uid,
        role: (data.role || '').toString()
      };
    }

    async function cpObtenerUsuarioPorDocId(ctx, id){
      const candidatos = [];
      if(id){ candidatos.push(id); }
      const normalizado = cpNormalizarEmail(id);
      if(normalizado && !candidatos.includes(normalizado)){ candidatos.push(normalizado); }
      for(const docId of candidatos){
        try {
          await ensureFirebaseListo();
          const snap = await ctx.db.collection('users').doc(docId).get();
          if(snap.exists){
            const info = cpNormalizarInfoUsuario(snap.id, snap.data() || {});
            cpAlmacenarUsuarioEnCaches(ctx, info);
            return info;
          }
        } catch (err) {
          console.warn('No se pudo obtener usuario por ID de documento', docId, err);
        }
      }
      if(normalizado && !ctx.usuariosCache.porEmail.has(normalizado)){
        ctx.usuariosCache.porEmail.set(normalizado, null);
      }
      return null;
    }

    async function cpObtenerUsuarioPorUserId(ctx, userId){
      const clave = (userId || '').toString().trim();
      if(!clave) return null;
      if(ctx.usuariosCache.porUserId.has(clave)){
        return ctx.usuariosCache.porUserId.get(clave);
      }
      let info = null;
      try {
        info = await cpObtenerUsuarioPorDocId(ctx, clave);
      } catch (err) {
        console.warn('No se pudo obtener usuario por coincidencia directa', err);
      }
      if(!info){
        try {
          await ensureFirebaseListo();
          const snap = await ctx.db.collection('users').where('uid','==',clave).limit(1).get();
          if(!snap.empty){
            const doc = snap.docs[0];
            info = cpNormalizarInfoUsuario(doc.id, doc.data() || {});
            cpAlmacenarUsuarioEnCaches(ctx, info);
          }
        } catch (err) {
          console.warn('No se pudo obtener usuario por UID', err);
        }
      }
      ctx.usuariosCache.porUserId.set(clave, info);
      if(info){ cpAlmacenarUsuarioEnCaches(ctx, info); }
      return info;
    }

    async function cpObtenerUsuarioPorAlias(ctx, alias){
      const clave = (alias || '').toString().trim().toLowerCase();
      if(!clave) return null;
      if(ctx.usuariosCache.porAlias.has(clave)){
        return ctx.usuariosCache.porAlias.get(clave);
      }
      let info = null;
      try {
        await ensureFirebaseListo();
        const snap = await ctx.db.collection('users').where('alias','==',alias).limit(1).get();
        if(!snap.empty){
          const doc = snap.docs[0];
          info = cpNormalizarInfoUsuario(doc.id, doc.data() || {});
          cpAlmacenarUsuarioEnCaches(ctx, info);
        }
      } catch (err) {
        console.warn('No se pudo obtener usuario por alias', err);
      }
      ctx.usuariosCache.porAlias.set(clave, info);
      if(info){ cpAlmacenarUsuarioEnCaches(ctx, info); }
      return info;
    }

    async function cpResolverIdentidadPersona(ctx, datos = {}){
      const aliasBase = (datos.alias || datos.aliasJugador || datos.aliascarton || '').toString().trim();
      const emailBase = cpNormalizarEmail(datos.email || datos.gmail || datos.IDbilletera || '');
      const userIdBase = (datos.userId || datos.usuarioId || '').toString().trim();
      if(emailBase && ctx.usuariosCache.porEmail.has(emailBase)){
        const cacheado = ctx.usuariosCache.porEmail.get(emailBase);
        if(cacheado){
          return {
            email: emailBase,
            alias: aliasBase || cacheado.alias || '',
            nombre: cacheado.nombre || '',
            userId: cacheado.uid || userIdBase || ''
          };
        }
        return { email: emailBase, alias: aliasBase, nombre: '', userId: userIdBase };
      }
      let info = null;
      if(userIdBase){ info = await cpObtenerUsuarioPorUserId(ctx, userIdBase); }
      if(!info && emailBase){ info = await cpObtenerUsuarioPorDocId(ctx, emailBase); }
      if(!info && aliasBase){ info = await cpObtenerUsuarioPorAlias(ctx, aliasBase); }
      const resultado = {
        email: cpNormalizarEmail(info?.email || emailBase),
        alias: aliasBase || (info?.alias || ''),
        nombre: info?.nombre || info?.name || '',
        userId: info?.uid || userIdBase || ''
      };
      if(!resultado.nombre && info){
        const nombreInferido = [info.name, info.apellido].filter(Boolean).join(' ').trim();
        if(nombreInferido) resultado.nombre = nombreInferido;
      }
      if(resultado.email){
        cpAlmacenarUsuarioEnCaches(ctx, {
          ...(info || {}),
          email: resultado.email,
          alias: resultado.alias,
          nombre: resultado.nombre,
          uid: resultado.userId
        });
      }
      return resultado;
    }

    function cpExtraerColaboradoresDesdeValor(lista, valor){
      if(!valor) return;
      if(Array.isArray(valor)){
        valor.forEach(item=>cpExtraerColaboradoresDesdeValor(lista, item));
        return;
      }
      if(typeof valor === 'string'){
        const texto = valor.trim();
        if(!texto) return;
        if(texto.includes('@')){
          lista.push({ email: texto });
        } else {
          lista.push({ alias: texto });
        }
        return;
      }
      if(typeof valor === 'object'){
        const candidato = {
          email: valor.email || valor.gmail || valor.correo || '',
          alias: valor.alias || valor.aliasJugador || valor.apodo || '',
          nombre: valor.nombre || valor.name || valor.displayName || '',
          userId: valor.userId || valor.uid || ''
        };
        if(candidato.email || candidato.alias || candidato.nombre || candidato.userId){
          lista.push(candidato);
        }
      }
    }

    function cpObtenerCandidatosColaboradores(ctx){
      const lista = [];
      const data = ctx.sorteoData || {};
      const clavesDirectas = [
        'colaboradores','colaboradoresDepositos','colaboradoresPagos',
        'responsablesDepositos','responsablesPagos','responsableDepositos','responsablePagos',
        'gestoresDepositos','gestoresPagos','gestoresTransacciones','colaboradoresTransacciones'
      ];
      clavesDirectas.forEach(clave=>cpExtraerColaboradoresDesdeValor(lista, data[clave]));
      Object.entries(data).forEach(([clave, valor])=>{
        if(clavesDirectas.includes(clave)) return;
        const lower = clave.toLowerCase();
        if(lower.includes('colab') || lower.includes('gestor') || lower.includes('respons') || lower.includes('adminpagos')){
          cpExtraerColaboradoresDesdeValor(lista, valor);
        }
      });
      return lista;
    }

    async function cpObtenerColaboradoresProcesados(ctx){
      const candidatos = cpObtenerCandidatosColaboradores(ctx);
      const mapa = new Map();
      for(const candidato of candidatos){
        const identidad = await cpResolverIdentidadPersona(ctx, candidato);
        const clave = identidad.email
          ? `email::${identidad.email}`
          : (identidad.alias ? `alias::${identidad.alias.toLowerCase()}` : '');
        if(!clave) continue;
        if(!mapa.has(clave)){
          mapa.set(clave, {
            gmail: identidad.email || '',
            alias: identidad.alias || candidato.alias || '',
            nombre: identidad.nombre || candidato.nombre || '',
            userIds: new Set(),
            creditos: 0
          });
        }
        const registro = mapa.get(clave);
        if(identidad.userId){ registro.userIds.add(identidad.userId); }
        if(candidato.userId){ registro.userIds.add(candidato.userId); }
        if(!registro.nombre && (candidato.nombre || identidad.nombre)){
          registro.nombre = identidad.nombre || candidato.nombre || '';
        }
        if(!registro.alias && (candidato.alias || identidad.alias)){
          registro.alias = identidad.alias || candidato.alias || '';
        }
      }
      return Array.from(mapa.values()).map(item=>({
        gmail: item.gmail,
        alias: item.alias,
        nombre: item.nombre,
        userIds: Array.from(item.userIds),
        creditos: item.creditos
      }));
    }

    function cpObtenerCampoNumeroFlexible(data, clave){
      if(!data) return 0;
      const claves = Array.isArray(clave) ? clave : [clave];
      const entradas = Object.entries(data);
      for(const claveBusqueda of claves){
        if(claveBusqueda == null) continue;
        const directa = data[claveBusqueda];
        const numeroDirecto = Number(directa);
        if(Number.isFinite(numeroDirecto)) return numeroDirecto;
        const coincidencia = entradas.find(([k])=>k.toLowerCase() === claveBusqueda.toLowerCase());
        if(coincidencia){
          const numeroCoincidencia = Number(coincidencia[1]);
          if(Number.isFinite(numeroCoincidencia)) return numeroCoincidencia;
        }
      }
      return 0;
    }

    async function cpObtenerUsuariosPorRolInterno(ctx, rolInterno){
      const resultados = [];
      const texto = (rolInterno || '').toString().trim();
      if(!texto) return resultados;
      const variantes = Array.from(new Set([
        texto,
        texto.toLowerCase(),
        texto.toUpperCase(),
        texto.charAt(0).toUpperCase() + texto.slice(1).toLowerCase()
      ].filter(Boolean)));
      const lotes = [];
      for(let i=0;i<variantes.length;i+=10){
        lotes.push(variantes.slice(i,i+10));
      }
      for(const lote of lotes){
        try {
          const snap = await ctx.db.collection('users').where('rolinterno','in',lote).get();
          snap.forEach(doc=>{
            const info = cpNormalizarInfoUsuario(doc.id, doc.data() || {});
            resultados.push({ ...info, rolinterno: doc.data()?.rolinterno || texto });
            cpAlmacenarUsuarioEnCaches(ctx, info);
          });
        } catch (err) {
          console.warn('No se pudieron obtener usuarios por rol interno', lote, err);
        }
      }
      if(!resultados.length){
        try {
          const snap = await ctx.db.collection('users').get();
          snap.forEach(doc=>{
            const data = doc.data() || {};
            const valor = (data.rolinterno || '').toString();
            if(valor && valor.toLowerCase() === texto.toLowerCase()){
              const info = cpNormalizarInfoUsuario(doc.id, data);
              resultados.push({ ...info, rolinterno: valor });
              cpAlmacenarUsuarioEnCaches(ctx, info);
            }
          });
        } catch (err) {
          console.warn('No se pudo obtener listado completo de usuarios para rol interno', texto, err);
        }
      }
      return resultados;
    }

    function cpObtenerPosicionesForma(forma){
      if(!forma) return [];
      const base = Array.isArray(forma.posicionesNormalizadas) && forma.posicionesNormalizadas.length
        ? forma.posicionesNormalizadas
        : forma.posiciones;
      const lista = Array.isArray(base) ? base : [];
      return lista
        .map(pos=>({
          r: Number(pos?.r ?? pos?.row ?? pos?.fila),
          c: Number(pos?.c ?? pos?.col ?? pos?.columna)
        }))
        .filter(pos=>Number.isInteger(pos.r) && Number.isInteger(pos.c));
    }

    function cpProcesarCantos(ctx, datos){
      const payload = Array.isArray(datos) ? { numeros: datos } : (datos && typeof datos === 'object' ? datos : { numeros: [] });
      const listaNumeros = Array.isArray(payload.numeros) ? payload.numeros : [];
      const normalizados = [];
      const detalles = Array.isArray(payload.detalles) ? payload.detalles : [];
      const detallesMap = new Map();
      detalles.forEach(item=>{
        const numero = cpNormalizarNumero(item?.numero ?? item?.valor ?? item?.canto ?? item?.etiqueta);
        if(numero === null) return;
        const orden = Number.isFinite(item?.orden) ? Number(item.orden) : undefined;
        const estadoTexto = (item?.estatus ?? item?.resultado ?? item?.estado ?? item?.status ?? '').toString().trim().toLowerCase();
        detallesMap.set(numero, { orden, estado: estadoTexto });
      });
      listaNumeros.forEach((valor, idx)=>{
        const numero = cpNormalizarNumero(valor);
        if(numero === null) return;
        normalizados.push(numero);
        if(!detallesMap.has(numero)){
          detallesMap.set(numero, { orden: idx, estado: '' });
        }
      });
      normalizados.sort((a,b)=>{
        const infoA = detallesMap.get(a) || {};
        const infoB = detallesMap.get(b) || {};
        const ordenA = Number.isFinite(infoA.orden) ? infoA.orden : normalizados.indexOf(a);
        const ordenB = Number.isFinite(infoB.orden) ? infoB.orden : normalizados.indexOf(b);
        return ordenA - ordenB;
      });
      const resultadoMapa = new Map();
      detallesMap.forEach((info, numero)=>{
        const estado = typeof info?.estado === 'string' ? info.estado.trim().toLowerCase() : '';
        if(estado === 'g' || estado === 'p'){
          resultadoMapa.set(numero, estado);
        }
      });
      ctx.cantosOrdenados = normalizados;
      ctx.cantosIndiceMap = new Map();
      normalizados.forEach((numero, idx)=>{
        if(!ctx.cantosIndiceMap.has(numero)){
          ctx.cantosIndiceMap.set(numero, idx);
        }
      });
      ctx.cantosResultadoMap = resultadoMapa;
    }

    async function cpCargarFormas(ctx){
      const snap = await ctx.db.collection('formas').where('sorteoId','==',ctx.sorteoId).get();
      ctx.formasData = [];
      snap.forEach(doc=>{
        const data = doc.data() || {};
        const idx = Number(data.idx ?? data.indice);
        if(!Number.isFinite(idx)) return;
        const posicionesNorm = cpNormalizarPosicionesEntrada(data.posicionesNormalizadas || data.posiciones || []);
        ctx.formasData.push({
          ...data,
          id: doc.id,
          idx,
          nombre: data.nombre || '',
          porcentaje: Number(data.porcentaje ?? data.porcentajePremio ?? data.porcentaje_forma ?? data.porcentajeForma ?? 0) || 0,
          premioCreditos: Number(data.premioCreditos ?? data.premiocreditos ?? data.creditos ?? 0) || 0,
          cartonesGratis: Number(data.cartonesGratis ?? data.cartonesgratis ?? data.cartones ?? 0) || 0,
          posicionesNormalizadas: posicionesNorm.map(pos=>({ r: pos.r, c: pos.c }))
        });
      });
      ctx.formasData.sort((a,b)=>(a.idx||0)-(b.idx||0));
    }

    async function cpCargarCartones(ctx){
      const snap = await ctx.db.collection('CartonJugado').where('sorteoId','==',ctx.sorteoId).get();
      ctx.cartonesMapa = new Map();
      snap.forEach(doc=>{
        const data = doc.data() || {};
        const posiciones = cpNormalizarPosicionesEntrada(data.posiciones || []);
        const valorPorPos = new Map();
        posiciones.forEach(pos=>{
          if(Number.isFinite(pos.valor)){
            valorPorPos.set(`${pos.r}-${pos.c}`, pos.valor);
          }
        });
        const carton = {
          ...data,
          id: doc.id,
          posiciones,
          valorPorPos,
          formasGanadas: []
        };
        ctx.cartonesMapa.set(doc.id, carton);
      });
    }

    async function cpCargarCantos(ctx){
      let cantosPayload = [];
      try {
        const doc = await ctx.db.collection('cantos').doc(ctx.sorteoId).get();
        if(doc.exists){
          cantosPayload = doc.data() || {};
        }
      } catch (err) {
        console.warn('No se pudieron cargar los cantos desde la colección cantos', err);
      }
      if((!cantosPayload || (Array.isArray(cantosPayload.numeros) && !cantosPayload.numeros.length))
        && Array.isArray(ctx.sorteoData?.cantos)){
        cantosPayload = ctx.sorteoData.cantos;
      }
      cpProcesarCantos(ctx, cantosPayload);
    }

    function cpObtenerCreditosForma(ctx, forma){
      if(!forma) return 0;
      const directo = Number(forma?.premioCreditos ?? forma?.premiocreditos ?? forma?.creditos);
      if(Number.isFinite(directo) && directo>0) return Math.round(directo);
      const porcentaje = Number(forma?.porcentaje ?? forma?.porcentajePremio ?? 0);
      const totalPremios = Number(ctx.sorteoData?.totalPremios) || 0;
      if(totalPremios>0 && porcentaje>0){
        return Math.round(totalPremios * (porcentaje/100));
      }
      return 0;
    }

    function cpObtenerCartonesGratisForma(forma){
      if(!forma) return 0;
      const candidatos = [
        forma?.cartonesGratis,
        forma?.cartonesgratis,
        forma?.cartones_gratis,
        forma?.premioCartonesGratis,
        forma?.premioCartonesgratis,
        forma?.cartones
      ];
      for(const candidato of candidatos){
        const numero = Number(candidato);
        if(Number.isFinite(numero)){
          return Math.max(0, Math.round(numero));
        }
      }
      return 0;
    }

    function cpCalcularResultados(ctx){
      ctx.cartonesGanadoresPorForma = new Map();
      ctx.formasPorCarton = new Map();
      ctx.cartonesMapa.forEach(carton=>{ carton.formasGanadas = []; });
      if(!ctx.formasData.length || !ctx.cartonesMapa.size || !ctx.cantosOrdenados.length){
        return;
      }
      ctx.formasData.forEach(forma=>{
        const idx = Number(forma?.idx);
        if(!Number.isFinite(idx)) return;
        const posiciones = cpObtenerPosicionesForma(forma);
        if(!posiciones.length){
          ctx.cartonesGanadoresPorForma.set(idx,{ forma, cartones: [], paso: null });
          return;
        }
        let mejorPaso = Infinity;
        const ganadores = [];
        ctx.cartonesMapa.forEach(carton=>{
          let valido = true;
          let maxPaso = -1;
          for(const pos of posiciones){
            const clave = `${pos.r}-${pos.c}`;
            const valor = carton.valorPorPos.get(clave);
            if(valor === undefined){
              valido = false;
              break;
            }
            const paso = ctx.cantosIndiceMap.get(valor);
            if(paso === undefined){
              valido = false;
              break;
            }
            if(paso > maxPaso) maxPaso = paso;
          }
          if(!valido) return;
          if(maxPaso < mejorPaso){
            mejorPaso = maxPaso;
            ganadores.length = 0;
            ganadores.push(carton);
          } else if(maxPaso === mejorPaso){
            ganadores.push(carton);
          }
        });
        ctx.cartonesGanadoresPorForma.set(idx,{ forma, cartones: ganadores, paso: mejorPaso });
        ganadores.forEach(carton=>{
          if(!ctx.formasPorCarton.has(carton.id)) ctx.formasPorCarton.set(carton.id, []);
          ctx.formasPorCarton.get(carton.id).push({ forma, paso: mejorPaso });
        });
      });
      ctx.formasPorCarton.forEach(lista=>{
        lista.sort((a,b)=>{
          if(a.paso !== b.paso) return a.paso - b.paso;
          return (Number(a.forma?.idx)||0) - (Number(b.forma?.idx)||0);
        });
      });
      ctx.cartonesMapa.forEach(carton=>{
        const lista = ctx.formasPorCarton.get(carton.id) || [];
        carton.formasGanadas = lista.map(item=>item.forma);
      });
    }

    async function cpObtenerGanadoresAgrupados(ctx){
      if(!ctx.cartonesMapa || ctx.cartonesMapa.size === 0){
        await cpCargarCartones(ctx);
      }
      if(!ctx.formasData || !ctx.formasData.length){
        await cpCargarFormas(ctx);
      }
      if(!(ctx.cartonesGanadoresPorForma instanceof Map)){
        ctx.cartonesGanadoresPorForma = new Map();
      }
      if(ctx.cartonesGanadoresPorForma.size === 0){
        cpCalcularResultados(ctx);
      }
      const jugadoresMapa = new Map();
      ctx.cartonesGanadoresPorForma.forEach(registro=>{
        const forma = registro?.forma;
        const ganadores = Array.isArray(registro?.cartones) ? registro.cartones : [];
        if(!forma || !ganadores.length) return;
        const totalCreditos = cpObtenerCreditosForma(ctx, forma);
        const totalGratis = cpObtenerCartonesGratisForma(forma);
        const cantidad = ganadores.length || 1;
        const creditosPorGanador = cantidad > 0 ? Math.floor(totalCreditos / cantidad) : 0;
        const gratisPorGanador = cantidad > 0 ? Math.floor(totalGratis / cantidad) : 0;
        ganadores.forEach(carton=>{
          const claveUsuario = (carton?.userId || carton?.usuarioId || '').toString().trim();
          const correoCarton = (carton?.gmail || carton?.email || carton?.IDbilletera || '').toString().trim();
          const aliasCarton = (carton?.alias || carton?.aliasCarton || '').toString();
          const clave = claveUsuario || (correoCarton ? `correo::${correoCarton.toLowerCase()}` : `alias::${aliasCarton.toLowerCase()}`);
          if(!jugadoresMapa.has(clave)){
            jugadoresMapa.set(clave, {
              userId: carton?.userId || carton?.usuarioId || '',
              email: correoCarton,
              alias: aliasCarton,
              creditos: 0,
              cartonesGratis: 0,
              formas: [],
              cartonesIds: new Set()
            });
          }
          const jugador = jugadoresMapa.get(clave);
          if(carton?.id){ jugador.cartonesIds.add(carton.id); }
          if(!jugador.userId && (carton?.userId || carton?.usuarioId)){ jugador.userId = carton?.userId || carton?.usuarioId; }
          if(!jugador.email && correoCarton){ jugador.email = correoCarton; }
          if(!jugador.alias && aliasCarton){ jugador.alias = aliasCarton; }
          jugador.creditos += creditosPorGanador;
          jugador.cartonesGratis += gratisPorGanador;
          jugador.formas.push({
            idx: Number(forma?.idx) || null,
            nombre: forma?.nombre || '',
            creditos: creditosPorGanador,
            cartonesGratis: gratisPorGanador
          });
        });
      });

      const agregados = new Map();
      for(const jugador of jugadoresMapa.values()){
        const identidad = await cpResolverIdentidadPersona(ctx, jugador);
        const claveResumen = identidad.email
          ? `email::${identidad.email}`
          : (identidad.alias ? `alias::${identidad.alias.toLowerCase()}` : '');
        if(!claveResumen) continue;
        if(!agregados.has(claveResumen)){
          agregados.set(claveResumen, {
            gmail: identidad.email || '',
            alias: identidad.alias || jugador.alias || '',
            nombre: identidad.nombre || '',
            creditos: 0,
            cartonesGratis: 0,
            formas: [],
            cartonesIds: new Set(),
            userIds: new Set()
          });
        }
        const resumen = agregados.get(claveResumen);
        if(identidad.userId){ resumen.userIds.add(identidad.userId); }
        if(jugador.userId){ resumen.userIds.add(jugador.userId); }
        jugador.cartonesIds.forEach(id=>resumen.cartonesIds.add(id));
        resumen.creditos += jugador.creditos;
        resumen.cartonesGratis += jugador.cartonesGratis;
        resumen.formas.push(...jugador.formas);
        if(!resumen.alias && jugador.alias){ resumen.alias = jugador.alias; }
        if(!resumen.nombre && identidad.nombre){ resumen.nombre = identidad.nombre; }
        if(!resumen.gmail && identidad.email){ resumen.gmail = identidad.email; }
      }

      const lista = Array.from(agregados.values()).map(item=>({
        gmail: item.gmail,
        alias: item.alias,
        nombre: item.nombre,
        creditos: item.creditos,
        cartonesGratis: item.cartonesGratis,
        formas: item.formas,
        cartonesGanadores: item.cartonesIds.size,
        userIds: Array.from(item.userIds)
      }));

      const totalCreditos = lista.reduce((acc,item)=>acc + (Number(item.creditos) || 0), 0);
      const totalCartonesGratis = lista.reduce((acc,item)=>acc + (Number(item.cartonesGratis) || 0), 0);

      return { lista, totalCreditos, totalCartonesGratis };
    }

    function cpConstruirIdSolicitud(base, identificador){
      const baseSeguro = cpSanitizarId(base || 'sorteo');
      const idSeguro = cpSanitizarId(identificador || 'registro');
      return `${baseSeguro}__${idSeguro}`;
    }

    async function cpActualizarDocumentoCentroPagos(ctx, ref, payload){
      try {
        await ctx.db.runTransaction(async tx => {
          const snap = await tx.get(ref);
          if(snap.exists){
            const data = snap.data() || {};
            const estadoActual = (data.estado || '').toString().trim().toUpperCase();
            if(estadoActual === 'APROBADO'){ return; }
          }
          tx.set(ref, payload, { merge: true });
        });
      } catch (err) {
        console.error('Error registrando solicitud en Centro de Pagos', ref.path, err);
        throw err;
      }
    }

    async function cpGenerarSolicitudesParaSorteo(ctx){
      await ensureFirebaseListo();
      await cpCargarFormas(ctx);

      await cpCargarCantos(ctx);
      cpCalcularResultados(ctx);
      const { lista: ganadores, totalCreditos, totalCartonesGratis } = await cpObtenerGanadoresAgrupados(ctx);

    function esSorteoFinalizado(data = {}){
      const candidatos = [data.estado, data.estadoactual, data.estadoSorteo, data.estado_sorteo];
      return candidatos.some(valor=>typeof valor === 'string' && valor.toLowerCase().trim() === 'finalizado');
    }

    async function procesarPagosPendientes(){
      const btn = document.getElementById('pagos-pendientes-btn');
      if(btn){
        btn.disabled = true;
        btn.textContent = 'Procesando...';
      }
      try {
        await ensureFirebaseListo();
        const db = dbRef();
        const finalizadosSnap = await db.collection('sorteos').get();
        const pendientes = [];
        finalizadosSnap.forEach(doc=>{
          const data = doc.data() || {};
          const finalizado = esSorteoFinalizado(data);
          const solicitudesGeneradas = data.solicitudesPagosGeneradas === true;
          if(finalizado && !solicitudesGeneradas){
            pendientes.push({ id: doc.id, data });
          }
        });
        if(!pendientes.length){
          alert('En este momento NO hay pagos pendientes de ningún sorteo FINALIZADO.');
          return;
        }
        let procesados = 0;
        let errores = 0;
        for(const sorteo of pendientes){
          try {
            const ctx = cpCrearContextoSorteo(sorteo.id, sorteo.data);
            await cpGenerarSolicitudesParaSorteo(ctx);
            procesados++;
          } catch (err) {
            errores++;
            console.error('Error generando solicitudes para el sorteo', sorteo.id, err);
          }
        }
        if(procesados === 0 && errores > 0){
          alert('No fue posible generar las solicitudes pendientes. Revisa la consola para más detalles.');
        } else if(errores > 0){
          alert(`Se generaron solicitudes para ${procesados} sorteo(s), pero ${errores} presentaron errores. Revisa la consola para más detalles.`);
        } else {
          alert(`Se generaron solicitudes para ${procesados} sorteo(s) finalizados. Las tablas se actualizarán en breve.`);
        }
      } catch (err) {
        console.error('Error verificando pagos pendientes', err);
        alert('No fue posible verificar los pagos pendientes. Inténtalo nuevamente.');
      } finally {
        if(btn){
          btn.disabled = false;
          btn.textContent = 'Pagos pendientes';
        }
      }
    }

    function escapeHtml(texto = ''){
      const fuente = texto == null ? '' : String(texto);
      return fuente.replace(/[&<>"']/g, (c=>({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[c] || c));
    }

    function normalizarFecha(valor){
      if(!valor) return { mostrar:'-', filtro:'', orden:0 };
      let fecha = null;
      if(valor && typeof valor.toDate === 'function'){ fecha = valor.toDate(); }
      else if(typeof valor === 'number'){ fecha = new Date(valor); }
      else if(typeof valor === 'string'){
        const limpio = valor.trim();
        if(/\d{4}-\d{2}-\d{2}/.test(limpio)) fecha = new Date(limpio + 'T00:00:00');
        else if(/\d{2}\/\d{2}\/\d{4}/.test(limpio)){
          const [d,m,a] = limpio.split('/');
          fecha = new Date(`${a}-${m}-${d}T00:00:00`);
        } else {
          const parseado = new Date(limpio);
          if(!Number.isNaN(parseado.getTime())) fecha = parseado;
        }
      }
      if(!fecha || Number.isNaN(fecha.getTime())){
        return { mostrar: valor && valor.toString ? valor.toString() : '-', filtro:'', orden:0 };
      }
      const dia = String(fecha.getDate()).padStart(2,'0');
      const mes = String(fecha.getMonth()+1).padStart(2,'0');
      const anio = fecha.getFullYear();
      return { mostrar: `${dia}/${mes}/${anio}`, filtro: `${anio}-${mes}-${dia}`, orden: fecha.getTime() };
    }

    function normalizarEstado(valor){
      const texto = (valor || '').toString().trim().toUpperCase();
      if(texto === 'APROBADO' || texto === 'PENDIENTE' || texto === 'ARCHIVADO') return texto;
      return 'PENDIENTE';
    }

        return;
      }
      const filas = lista.map((item, indice)=>{
        const numero = indice + 1;
        const estadoClase = item.estado === 'APROBADO' ? 'estado-aprobado' : (item.estado === 'PENDIENTE' ? 'estado-pendiente' : 'estado-archivado');
        const estadoHtml = `<span class="${estadoClase}">${item.estado}</span>`;
        const disabled = mostrarArchivo ? 'disabled' : '';
        if(tipo === 'premios'){
          return `<tr data-id="${item.id}">
            <td>${numero}</td>
            <td class="gmail">${escapeHtml(item.gmail)}</td>
            <td class="alias">${escapeHtml(item.alias)}</td>
            <td>${formatNumber.format(item.creditos)}</td>
            <td>${formatNumber.format(item.cartones)}</td>

          </tr>`;

          const valorReferencia = pagosColaboradoresEdicion.has(item.id)
            ? pagosColaboradoresEdicion.get(item.id)
            : item.creditos;
          const numeroValor = Number(valorReferencia);
          const valorInput = Number.isFinite(numeroValor) ? numeroValor.toFixed(2) : '';
          const archivoAttr = mostrarArchivo ? ' data-archivo="1"' : '';

            <td class="gmail">${escapeHtml(item.gmail)}</td>
            <td class="alias">${escapeHtml(item.nombre)}</td>

          <td>${numero}</td>
          <td class="gmail">${escapeHtml(item.gmail)}</td>
          <td class="alias">${escapeHtml(item.nombre)}</td>
          <td>${formatNumber.format(item.creditos)}</td>

          <td class="estado">${estadoHtml}</td>
          <td><input type="checkbox" data-id="${item.id}" ${disabled}></td>

      }).join('');

        if(filtrosPremios.cartones && !item.cartones.toString().includes(filtrosPremios.cartones)) return false;

        if(filtrosPremios.estado && item.estado !== filtrosPremios.estado) return false;
        return true;

    async function acreditarPremio(enRegistro){
      const db = dbRef();
      if(!enRegistro.billetera) return;
      await db.runTransaction(async tx => {
        const billeteraRef = db.collection('Billetera').doc(enRegistro.billetera);
        const billeteraDoc = await tx.get(billeteraRef);
        const datos = billeteraDoc.exists ? billeteraDoc.data() : {};
        const nuevosCreditos = (Number(datos.creditos) || 0) + enRegistro.creditos;
        const nuevosCartones = (Number(datos.CartonesGratis) || 0) + enRegistro.cartones;
        tx.set(billeteraRef, { creditos: nuevosCreditos, CartonesGratis: nuevosCartones }, { merge: true });
      });
      await registrarTransaccionPremio(enRegistro);
    }

    async function acreditarPago(enRegistro){
      const db = dbRef();
      if(!enRegistro.billetera) return;
      const creditos = Number(enRegistro.creditos) || 0;
      if(creditos <= 0) return;
      await db.runTransaction(async tx => {
        const billeteraRef = db.collection('Billetera').doc(enRegistro.billetera);
        const billeteraDoc = await tx.get(billeteraRef);
        const datos = billeteraDoc.exists ? billeteraDoc.data() : {};
        const nuevosCreditos = (Number(datos.creditos) || 0) + creditos;
        tx.set(billeteraRef, { creditos: nuevosCreditos }, { merge: true });
      });
      await registrarTransaccionPremio({ ...enRegistro, creditos, cartones: 0 });
    }

    async function aprobarPremios(ids){
      if(!ids.length) return;
      const db = dbRef();
      await initServerTime();
      for(const id of ids){
        const registro = premiosMapa.get(id);
        if(!registro){ console.warn('Premio no encontrado', id); continue; }
        if(registro.estado === 'APROBADO'){ continue; }
        try {
          await db.runTransaction(async tx => {
            const ref = db.collection('PremiosSorteos').doc(id);
            const snap = await tx.get(ref);
            if(!snap.exists) return;
            const data = snap.data();
            const estadoActual = normalizarEstado(data.estado);
            if(estadoActual === 'APROBADO') return;
            tx.update(ref, {
              estado: 'APROBADO',
              fechaGestion: fechaServidor(),
              horaGestion: horaServidor(),
              gestionadoPor: authInstance().currentUser?.email || '',
              rolGestor: window.currentRole || ''
            });
          });
          await acreditarPremio(registro);
        } catch (err) {
          console.error('Error aprobando premio', err);
          alert('Ocurrió un error al aprobar un premio. Revisa la consola para más detalles.');
          break;
        }
      }
    }

    async function aprobarPagosColaboradores(ids){
      if(!ids.length) return;
      const db = dbRef();
      await initServerTime();
      for(const id of ids){
        const registro = pagosColaboradoresMapa.get(id);
        if(!registro){ console.warn('Pago de colaborador no encontrado', id); continue; }
        if(registro.estado === 'APROBADO'){ continue; }
        const valorEdicion = pagosColaboradoresEdicion.has(id)
          ? pagosColaboradoresEdicion.get(id)
          : registro.creditos;
        const monto = Number(valorEdicion);
        if(!Number.isFinite(monto) || monto <= 0){
          alert(' para poder APROBAR el pago, debes ingresar una cantidad de CREDITOS mayor a 0');
          return;
        }
        try {
          await db.runTransaction(async tx => {
            const ref = db.collection('PagosColaboradores').doc(id);
            const snap = await tx.get(ref);
            if(!snap.exists) return;
            const data = snap.data();
            const estadoActual = normalizarEstado(data.estado);
            if(estadoActual === 'APROBADO') return;
            tx.update(ref, {
              estado: 'APROBADO',
              creditos: monto,
              fechaGestion: fechaServidor(),
              horaGestion: horaServidor(),
              gestionadoPor: authInstance().currentUser?.email || '',
              rolGestor: window.currentRole || ''
            });
          });
          pagosColaboradoresEdicion.delete(id);
          await acreditarPago({ ...registro, creditos: monto });
        } catch (err) {
          console.error('Error aprobando pago de colaborador', err);
          alert('Ocurrió un error al aprobar un pago de colaborador. Revisa la consola para más detalles.');
          break;
        }
      }
    }

    async function archivarRegistros(ids, tipo){
      if(!ids.length) return;
      const db = dbRef();
      await initServerTime();
      let coleccionBase = db.collection('PagosAdministracion');
      let coleccionArchivo = db.collection('PagosAdministracionArchivo');
      if(tipo === 'premios'){
        coleccionBase = db.collection('PremiosSorteos');
        coleccionArchivo = db.collection('PremiosSorteosArchivo');
      } else if(tipo === 'colaboradores'){
        coleccionBase = db.collection('PagosColaboradores');
        coleccionArchivo = db.collection('PagosColaboradoresArchivo');
      }
      for(const id of ids){
        try {
          await db.runTransaction(async tx => {
            const ref = coleccionBase.doc(id);
            const snap = await tx.get(ref);
            if(!snap.exists) return;
            const data = snap.data();
            const datosArchivo = {
              ...data,
              estado: normalizarEstado(data.estado),
              archivadoEn: fechaServidor(),
              horaArchivado: horaServidor(),
              archivadoPor: authInstance().currentUser?.email || ''
            };
            tx.set(coleccionArchivo.doc(id), datosArchivo, { merge: true });
            tx.delete(ref);
          });
        } catch (err) {
          console.error('Error archivando registro', tipo, err);
          alert('No se pudo archivar uno de los registros seleccionados.');
          break;
        }
      }
    }

    function configurarFiltros(){
      document.getElementById('filtro-premios-gmail').addEventListener('input', e=>{ filtrosPremios.gmail = e.target.value.toLowerCase().trim(); renderPremios(); });
      document.getElementById('filtro-premios-alias').addEventListener('input', e=>{ filtrosPremios.alias = e.target.value.toLowerCase().trim(); renderPremios(); });
      document.getElementById('filtro-premios-creditos').addEventListener('input', e=>{ filtrosPremios.creditos = e.target.value.replace(/[^0-9.]/g,''); renderPremios(); });
      document.getElementById('filtro-premios-cartones').addEventListener('input', e=>{ filtrosPremios.cartones = e.target.value.replace(/[^0-9]/g,''); renderPremios(); });
      document.getElementById('filtro-premios-fecha').addEventListener('change', e=>{ filtrosPremios.fecha = e.target.value; renderPremios(); });
      document.getElementById('filtro-premios-estado').addEventListener('change', e=>{ filtrosPremios.estado = e.target.value; renderPremios(); });

      document.getElementById('filtro-pagos-gmail').addEventListener('input', e=>{ filtrosPagos.gmail = e.target.value.toLowerCase().trim(); renderPagos(); });
      document.getElementById('filtro-pagos-nombre').addEventListener('input', e=>{ filtrosPagos.nombre = e.target.value.toLowerCase().trim(); renderPagos(); });
      document.getElementById('filtro-pagos-creditos').addEventListener('input', e=>{ filtrosPagos.creditos = e.target.value.replace(/[^0-9.]/g,''); renderPagos(); });
      document.getElementById('filtro-pagos-fecha').addEventListener('change', e=>{ filtrosPagos.fecha = e.target.value; renderPagos(); });
      document.getElementById('filtro-pagos-estado').addEventListener('change', e=>{ filtrosPagos.estado = e.target.value; renderPagos(); });

      document.getElementById('filtro-colab-gmail').addEventListener('input', e=>{ filtrosColaboradores.gmail = e.target.value.toLowerCase().trim(); renderColaboradores(); });
      document.getElementById('filtro-colab-nombre').addEventListener('input', e=>{ filtrosColaboradores.nombre = e.target.value.toLowerCase().trim(); renderColaboradores(); });
      document.getElementById('filtro-colab-creditos').addEventListener('input', e=>{ filtrosColaboradores.creditos = e.target.value.replace(/[^0-9.]/g,''); renderColaboradores(); });
      document.getElementById('filtro-colab-fecha').addEventListener('change', e=>{ filtrosColaboradores.fecha = e.target.value; renderColaboradores(); });
      document.getElementById('filtro-colab-estado').addEventListener('change', e=>{ filtrosColaboradores.estado = e.target.value; renderColaboradores(); });
    }

    function configurarBotones(){
      document.getElementById('premios-marcar').addEventListener('click', ()=>seleccionarTodos('tabla-premios'));
      document.getElementById('pagos-marcar').addEventListener('click', ()=>seleccionarTodos('tabla-pagos'));

      const pagosPendientesBtn = document.getElementById('pagos-pendientes-btn');
      if(pagosPendientesBtn){
        pagosPendientesBtn.addEventListener('click', procesarPagosPendientes);
      }

      document.getElementById('premios-aprobar').addEventListener('click', async()=>{
        const seleccion = obtenerSeleccion('tabla-premios');
        if(!seleccion.length){ alert('Selecciona al menos un registro.'); return; }
        await aprobarPremios(seleccion);
      });
      document.getElementById('premios-archivar').addEventListener('click', async()=>{
        const seleccion = obtenerSeleccion('tabla-premios');
        if(!seleccion.length){ alert('Selecciona registros para archivar.'); return; }
        if(!(await confirm('¿Deseas archivar los registros seleccionados?'))) return;
        await archivarRegistros(seleccion, 'premios');
      });
      document.getElementById('premios-ver-archivo').addEventListener('click', ()=>{
        mostrarPremiosArchivo = !mostrarPremiosArchivo;
        renderPremios();
      });

      document.getElementById('pagos-aprobar').addEventListener('click', async()=>{
        const seleccion = obtenerSeleccion('tabla-pagos');
        if(!seleccion.length){ alert('Selecciona al menos un registro.'); return; }
        await aprobarPagos(seleccion);
      });
      document.getElementById('pagos-archivar').addEventListener('click', async()=>{
        const seleccion = obtenerSeleccion('tabla-pagos');
        if(!seleccion.length){ alert('Selecciona registros para archivar.'); return; }
        if(!(await confirm('¿Deseas archivar los registros seleccionados?'))) return;
        await archivarRegistros(seleccion, 'pagos');
      });
      document.getElementById('pagos-ver-archivo').addEventListener('click', ()=>{
        mostrarPagosArchivo = !mostrarPagosArchivo;
        renderPagos();
      });

      document.getElementById('colaboradores-marcar').addEventListener('click', ()=>seleccionarTodos('tabla-colaboradores'));
      document.getElementById('colaboradores-aprobar').addEventListener('click', async()=>{
        const seleccion = obtenerSeleccion('tabla-colaboradores');
        if(!seleccion.length){ alert('Selecciona al menos un registro.'); return; }
        await aprobarPagosColaboradores(seleccion);
      });
      document.getElementById('colaboradores-archivar').addEventListener('click', async()=>{
        const seleccion = obtenerSeleccion('tabla-colaboradores');
        if(!seleccion.length){ alert('Selecciona registros para archivar.'); return; }
        if(!(await confirm('¿Deseas archivar los registros seleccionados?'))) return;
        await archivarRegistros(seleccion, 'colaboradores');
      });
      document.getElementById('colaboradores-ver-archivo').addEventListener('click', ()=>{
        mostrarColaboradoresArchivo = !mostrarColaboradoresArchivo;
        renderColaboradores();
      });

      const tablaColaboradores = document.getElementById('tabla-colaboradores');
      tablaColaboradores.addEventListener('change', e=>{
        if(e.target.matches('tbody input[type="checkbox"]')){
          const id = e.target.dataset.id;
          const fila = e.target.closest('tr');
          const input = fila ? fila.querySelector('.colab-input') : null;
          if(!input) return;
          const registroActual = pagosColaboradoresMapa.get(id);
          if(registroActual && registroActual.estado === 'APROBADO'){
            e.target.checked = false;
            input.disabled = true;
            return;
          }
          if(e.target.checked && !mostrarColaboradoresArchivo){
            input.disabled = false;
            input.focus();
            input.select();
          } else {
            input.disabled = true;
            const registro = pagosColaboradoresMapa.get(id) || pagosColaboradoresArchivoMapa.get(id) || null;
            const valor = registro ? Number(registro.creditos) || 0 : 0;
            pagosColaboradoresEdicion.delete(id);
            input.value = valor.toFixed(2);
          }
        }
      });
      tablaColaboradores.addEventListener('input', e=>{
        if(e.target.matches('.colab-input')){
          pagosColaboradoresEdicion.set(e.target.dataset.id, e.target.value);
        }
      });

      const togglePremios = document.getElementById('toggle-premios');
      const contenidoPremios = document.getElementById('premios-content');
      togglePremios.addEventListener('change', ()=>{ contenidoPremios.style.display = togglePremios.checked ? 'block' : 'none'; });
      contenidoPremios.style.display = 'none';

      const togglePagos = document.getElementById('toggle-pagos');
      const contenidoPagos = document.getElementById('pagos-content');
      togglePagos.addEventListener('change', ()=>{ contenidoPagos.style.display = togglePagos.checked ? 'block' : 'none'; });
      contenidoPagos.style.display = 'none';

      const toggleColaboradores = document.getElementById('toggle-colaboradores');
      const contenidoColaboradores = document.getElementById('colaboradores-content');
      toggleColaboradores.addEventListener('change', ()=>{ contenidoColaboradores.style.display = toggleColaboradores.checked ? 'block' : 'none'; });
      contenidoColaboradores.style.display = 'none';

      document.getElementById('volver-btn').addEventListener('click', e=>volverConFallback(e));
    }

    let intentoRetornoActivo = false;

    function volverConFallback(event){
      if(event){ event.preventDefault(); }
      if(intentoRetornoActivo){
        intentoRetornoActivo = false;
        window.location.href = 'cantarsorteos.html';
        return;
      }
      if(window.history.length > 1){
        intentoRetornoActivo = true;
        setTimeout(()=>{
          if(intentoRetornoActivo){
            intentoRetornoActivo = false;
            window.location.href = 'cantarsorteos.html';
          }
        }, 600);
        window.history.back();
        return;
      }
      intentoRetornoActivo = false;
      const role = (window.currentRole)||'';
      if(role === 'Administrador'){ window.location.href = 'admin.html'; }
      else if(role === 'Superadmin'){ window.location.href = 'super.html'; }
      else { window.location.href = 'cantarsorteos.html'; }
    }

    function suscribirColecciones(){
      const db = dbRef();
      unsubscribePremios = db.collection('PremiosSorteos').onSnapshot(snapshot => {
        premiosActivos.length = 0;
        premiosMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPremio(doc.id, doc.data());
          premiosActivos.push(registro);
          premiosMapa.set(doc.id, registro);
        });
        renderPremios();
      });
      unsubscribePremiosArchivo = db.collection('PremiosSorteosArchivo').onSnapshot(snapshot => {
        premiosArchivados.length = 0;
        premiosArchivoMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPremio(doc.id, doc.data());
          registro.estado = normalizarEstado(doc.data().estado || 'ARCHIVADO');
          premiosArchivados.push(registro);
          premiosArchivoMapa.set(doc.id, registro);
        });
        if(mostrarPremiosArchivo) renderPremios();
      });
      unsubscribePagos = db.collection('PagosAdministracion').onSnapshot(snapshot => {
        pagosAdminActivos.length = 0;
        pagosAdminMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPago(doc.id, doc.data());
          pagosAdminActivos.push(registro);
          pagosAdminMapa.set(doc.id, registro);
        });
        renderPagos();
      });
      unsubscribePagosArchivo = db.collection('PagosAdministracionArchivo').onSnapshot(snapshot => {
        pagosAdminArchivados.length = 0;
        pagosAdminArchivoMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPago(doc.id, doc.data());
          registro.estado = normalizarEstado(doc.data().estado || 'ARCHIVADO');
          pagosAdminArchivados.push(registro);
          pagosAdminArchivoMapa.set(doc.id, registro);
        });
        if(mostrarPagosArchivo) renderPagos();
      });
      unsubscribeColaboradores = db.collection('PagosColaboradores').onSnapshot(snapshot => {
        pagosColaboradoresActivos.length = 0;
        pagosColaboradoresMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPago(doc.id, doc.data());
          pagosColaboradoresActivos.push(registro);
          pagosColaboradoresMapa.set(doc.id, registro);
          pagosColaboradoresEdicion.delete(doc.id);
        });
        renderColaboradores();
      });
      unsubscribeColaboradoresArchivo = db.collection('PagosColaboradoresArchivo').onSnapshot(snapshot => {
        pagosColaboradoresArchivados.length = 0;
        pagosColaboradoresArchivoMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPago(doc.id, doc.data());
          registro.estado = normalizarEstado(doc.data().estado || 'ARCHIVADO');
          pagosColaboradoresArchivados.push(registro);
          pagosColaboradoresArchivoMapa.set(doc.id, registro);
        });
        if(mostrarColaboradoresArchivo) renderColaboradores();
      });
    }

    window.addEventListener('beforeunload', ()=>{
      [
        unsubscribePremios,
        unsubscribePremiosArchivo,
        unsubscribePagos,
        unsubscribePagosArchivo,
        unsubscribeColaboradores,
        unsubscribeColaboradoresArchivo
      ].forEach(unsub=>{
        if(typeof unsub === 'function') unsub();
      });
    });

    configurarFiltros();
    configurarBotones();
    suscribirColecciones();
  </script>
  <script src="js/backNavigation.js"></script>
</body>
