<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="img/favicon-32x32.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
      body {
          font-family: 'Poppins', sans-serif;
          background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)),
                      url('https://img.freepik.com/vetores-premium/padrao-sem-costura-com-simbolos-de-dolar-e-porcentagem_637741-777.jpg');
          background-repeat: repeat;
          background-size: auto;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding-top: 20px;
          min-height: 100vh;
          text-align: center;
          margin: 0;
      }
      .back-btn {
          position: fixed;
          top: 5px;
          left: 5px;
          width: 120px;
          height: 40px;
          font-family: 'Bangers', cursive;
          font-size: 1.2rem;
          background: orange;
          color: white;
          border: 4px solid #FFD700;
          border-radius: 10px;
          text-shadow: 2px 2px 4px #000;
          text-transform: uppercase;
          display:flex;
          align-items:center;
          justify-content:center;
          gap:5px;
      }
      main#perfil-contenido {
          width: min(420px, 90vw);
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 10px;
          margin-top: clamp(50px, 12vh, 110px);
      }
      input, select {font-size:1rem;padding:8px;text-align:center;border-radius:8px;border:1px solid #ccc;width:100%;box-sizing:border-box;display:block;}
      .menu-btn { width:140px; }
      h3, h4 { margin:5px 0; }
      #session-info {
          position: fixed;
          top: 10px;
          right: 10px;
          display: flex;
          align-items: center;
          font-size: 0.7rem;
      }
      #user-pic {
          width: 40px;
          height: 40px;
          border-radius: 50%;
      }
      #logout-link {
          font-family: Calibri, Arial, sans-serif;
          margin-left: 5px;
          font-size: 0.7rem;
          color: #007bff;
          text-decoration: underline;
      }
      #perfil-nombre, #perfil-apellido, #perfil-alias {font-weight:bold;}
      #perfil-nombre, #perfil-apellido {color:#00008B;}
      #perfil-alias {color:#FF8C00;}
      #perfil-titulo {
          font-family: 'Bangers', cursive;
          font-size: clamp(2rem, 5vw, 2.6rem);
          color: #ffffff;
          text-shadow: 0 0 14px rgba(0, 26, 95, 0.8);
          letter-spacing: 1px;
      }
      #perfil-subtitulo {
          font-family: 'Poppins', sans-serif;
          color: #0b1b4d;
          margin-bottom: 4px;
      }
      #guardar-perfil-btn {
          font-family: 'Bangers', cursive;
          font-size: 1.2rem;
          background: linear-gradient(135deg, #0a8800, #48c752);
          color: white;
          border: 3px solid #FFD700;
          border-radius: 10px;
          text-shadow: 2px 2px 4px #000;
          width: 220px;
          cursor: pointer;
          transition: background 0.3s ease, box-shadow 0.3s ease;
      }
      #guardar-perfil-btn.modo-edicion {
          background: linear-gradient(135deg, #083cbe, #ffffff);
          box-shadow: 0 0 14px rgba(8, 60, 190, 0.45);
      }
      #jugar-carton-btn{
          font-family:'Bangers',cursive;
          font-size:1.2rem;
          background:linear-gradient(orange,white);
          color:white;
          border:3px solid #FFD700;
          border-radius:8px;
          text-shadow:2px 2px 4px #000;
          width:200px;
          cursor:pointer;
          margin-top:10px;
      }
      #fecha-hora, #derechos { font-size:0.7rem; text-align:center; color:#000; margin:0; }
      #fecha-hora { margin-top:auto; padding-top:12px; }
      #derechos { font-size:0.6rem; padding-bottom:12px; }
      .modal-whatsapp {
          position: fixed;
          inset: 0;
          display: none;
          align-items: center;
          justify-content: center;
          padding: clamp(18px, 6vw, 28px);
          background: rgba(0, 0, 0, 0.6);
          box-sizing: border-box;
          z-index: 1200;
      }
      .modal-whatsapp.activa {
          display: flex;
      }
      .modal-whatsapp .modal-contenido {
          background: #ffffff;
          border-radius: 18px;
          padding: clamp(22px, 6vw, 36px);
          width: min(360px, 90vw);
          max-width: 90vw;
          display: flex;
          flex-direction: column;
          gap: clamp(12px, 4vw, 20px);
          text-align: center;
          border: 4px solid #ffd700;
          box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }
      .modal-whatsapp .modal-contenido h2 {
          margin: 0;
          font-family: 'Bangers', cursive;
          font-size: clamp(1.3rem, 4.6vw, 1.8rem);
          color: #0056ff;
          text-shadow: 0 0 6px rgba(255, 215, 0, 0.9);
      }
      .modal-whatsapp .modal-mensaje {
          margin: 0;
          font-size: clamp(0.95rem, 4vw, 1.2rem);
          color: #333333;
      }
      .modal-whatsapp-acciones {
          display: flex;
          justify-content: center;
      }
      #modal-whatsapp-aceptar {
          font-family: 'Bangers', cursive;
          font-size: clamp(1rem, 3.6vw, 1.2rem);
          background: linear-gradient(135deg, #0a8800, #51c94d);
          color: #ffffff;
          border: 3px solid #ffd700;
          border-radius: 10px;
          padding: 10px 18px;
          cursor: pointer;
          transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      #modal-whatsapp-aceptar:hover,
      #modal-whatsapp-aceptar:focus {
          transform: translateY(-1px);
          box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
          outline: none;
      }
      @media (orientation: portrait) {
          .modal-whatsapp {
              align-items: center;
              justify-content: center;
          }
      }
  </style>
</head>
<body>
  <div id="session-info" style="display:none;">
    <img id="user-pic" referrerpolicy="no-referrer" crossorigin="anonymous" src="" alt="Usuario" />
    <a href="#" id="logout-link">Cerrar sesión</a>
  </div>
  <button id="volver-btn" class="menu-btn back-btn" data-compact-back="true">&#9664; Volver</button>
  <main id="perfil-contenido">
    <h3 id="perfil-titulo">Perfil del Jugador</h3>
    <h4 id="perfil-subtitulo">Tus Datos Personales</h4>
    <input type="text" id="perfil-nombre" placeholder="Nombre" />
    <input type="text" id="perfil-apellido" placeholder="Apellido" />
    <input type="text" id="perfil-alias" placeholder="Alias" />
    <button id="guardar-perfil-btn" class="menu-btn" data-modo="guardar">Guardar</button>
    <button id="jugar-carton-btn" class="menu-btn" onclick="window.location.href='jugarcartones.html'">Jugar Cartón</button>
  </main>

  <div id="modal-whatsapp" class="modal-whatsapp" role="dialog" aria-modal="true" aria-labelledby="modal-whatsapp-titulo" aria-hidden="true">
    <div class="modal-contenido" role="document">
      <h2 id="modal-whatsapp-titulo">GRUPO DE WHATSAPP NO DISPONIBLE</h2>
      <p id="modal-whatsapp-mensaje" class="modal-mensaje">Aún no hay grupos disponibles de WhatsApp</p>
      <div class="modal-whatsapp-acciones">
        <button type="button" id="modal-whatsapp-aceptar">Aceptar</button>
      </div>
    </div>
  </div>

  <div id="fecha-hora"></div>
  <div id="derechos">Todos los derechos reservados ® Hexaservice 2025</div>

  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/timezone.js"></script>
  <script>
  ensureAuth();
  initFechaHora('fecha-hora');

  const nombreInput=document.getElementById('perfil-nombre');
  const apellidoInput=document.getElementById('perfil-apellido');
  const aliasInput=document.getElementById('perfil-alias');
  const guardarBtn=document.getElementById('guardar-perfil-btn');
  const whatsappModalEl=document.getElementById('modal-whatsapp');
  const whatsappModalMensajeEl=document.getElementById('modal-whatsapp-mensaje');
  const whatsappModalAceptarBtn=document.getElementById('modal-whatsapp-aceptar');

  nombreInput.placeholder='Nombre';
  apellidoInput.placeholder='Apellido';
  aliasInput.placeholder='Alias';

  let valoresOriginales={name:'',apellido:'',alias:''};
  let tieneDatosGuardados=false;

  document.getElementById('volver-btn').addEventListener('click',()=>{window.location.href='player.html';});
  guardarBtn.addEventListener('click',guardarPerfil);

  [nombreInput,apellidoInput,aliasInput].forEach(input=>{
    input.addEventListener('input',evaluarCambios);
  });

  function mostrarModalWhatsapp(mensaje){
    if(!whatsappModalEl) return;
    const texto=(mensaje||'').toString().trim();
    if(whatsappModalMensajeEl){
      whatsappModalMensajeEl.textContent=texto.length?texto:'Aún no hay grupos disponibles de WhatsApp';
    }
    whatsappModalEl.classList.add('activa');
    whatsappModalEl.removeAttribute('aria-hidden');
    if(whatsappModalAceptarBtn){
      whatsappModalAceptarBtn.focus();
    }
  }

  function cerrarModalWhatsapp(){
    if(!whatsappModalEl) return;
    whatsappModalEl.classList.remove('activa');
    whatsappModalEl.setAttribute('aria-hidden','true');
  }

  if(whatsappModalAceptarBtn){
    whatsappModalAceptarBtn.addEventListener('click',cerrarModalWhatsapp);
  }
  if(whatsappModalEl){
    whatsappModalEl.addEventListener('click',evento=>{
      if(evento.target===whatsappModalEl){
        cerrarModalWhatsapp();
      }
    });
  }
  window.mostrarModalWhatsapp=mostrarModalWhatsapp;
  window.cerrarModalWhatsapp=cerrarModalWhatsapp;

  function obtenerValoresPerfil(){
    return {
      name:nombreInput.value.trim(),
      apellido:apellidoInput.value.trim(),
      alias:aliasInput.value.trim()
    };
  }

  function establecerEstadoBoton(modo){
    if(modo==='editar'){
      guardarBtn.textContent='Editar';
      guardarBtn.dataset.modo='editar';
      guardarBtn.classList.add('modo-edicion');
    }else{
      guardarBtn.textContent='Guardar';
      guardarBtn.dataset.modo='guardar';
      guardarBtn.classList.remove('modo-edicion');
    }
  }

  function evaluarCambios(){
    const actuales=obtenerValoresPerfil();
    const hayCambios=['name','apellido','alias'].some(campo=>actuales[campo]!==valoresOriginales[campo]);
    if(tieneDatosGuardados && hayCambios){
      establecerEstadoBoton('editar');
    }else{
      establecerEstadoBoton('guardar');
    }
  }

  async function guardarPerfil(){
    const user = auth.currentUser;
    if(!user) return;
    const modo=(guardarBtn.dataset.modo||'guardar')==='editar'?'editar':'guardar';
    const confirmar=await window.confirm(modo==='editar'?'¿Deseas EDITAR los datos?':'¿Deseas GUARDAR los datos de tu perfil?');
    if(!confirmar) return;
    const valores=obtenerValoresPerfil();
    const baseDatos={
      email:user.email,
      photoURL:user.photoURL||'',
      role:'Jugador'
    };
    try{
      if(modo==='editar'){
        const cambios={};
        ['name','apellido','alias'].forEach(campo=>{
          if(valores[campo]!==valoresOriginales[campo]){
            cambios[campo]=valores[campo];
          }
        });
        if(Object.keys(cambios).length===0){
          alert('No se detectaron cambios para editar.');
          evaluarCambios();
          return;
        }
        await db.collection('users').doc(user.email).set({...baseDatos,...cambios},{merge:true});
        alert('Datos editados correctamente.');
        tieneDatosGuardados=Object.values(valores).some(valor=>valor.length>0);
      }else{
        await db.collection('users').doc(user.email).set({...baseDatos,...valores},{merge:true});
        alert('Datos guardados correctamente.');
        tieneDatosGuardados=Object.values(valores).some(valor=>valor.length>0);
      }
      valoresOriginales=valores;
      evaluarCambios();
    }catch(error){
      console.error('No se pudieron guardar los datos del perfil',error);
      alert('Ocurrió un error al guardar los datos. Intenta nuevamente.');
    }
  }

  auth.onAuthStateChanged(async user=>{
    if(user){
      try{
        const doc=await db.collection('users').doc(user.email).get();
        if(doc.exists){
          const d=doc.data()||{};
          valoresOriginales={
            name:(d.name||'').trim(),
            apellido:(d.apellido||'').trim(),
            alias:(d.alias||'').trim()
          };
          nombreInput.value=valoresOriginales.name;
          apellidoInput.value=valoresOriginales.apellido;
          aliasInput.value=valoresOriginales.alias;
          tieneDatosGuardados=Object.values(valoresOriginales).some(valor=>valor.length>0);
        }else{
          valoresOriginales={name:'',apellido:'',alias:''};
          nombreInput.value='';
          apellidoInput.value='';
          aliasInput.value='';
          tieneDatosGuardados=false;
        }
      }catch(error){
        console.error('No se pudo cargar la información del perfil',error);
      }
      evaluarCambios();
    } else { window.location.href='index.html'; }
  });
  </script>
  <script src="js/backNavigation.js"></script>
</body>
</html>
