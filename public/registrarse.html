<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="img/favicon-32x32.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://img.freepik.com/vectores-premium/padrao-sem-costura-com-simbolos-de-dolar-e-porcentagem_637741-777.jpg');
      background-repeat: repeat;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
      margin:0;
      position:relative;
    }
    h2{
      font-family:'Bangers',cursive;
      color:#ff6600;
      text-shadow:2px 2px 4px #000;
      margin-bottom:10px;
    }
    input{
      font-size:1rem;
      padding:5px;
      margin:5px;
      width:250px;
      text-align:center;
      background:#fff;
      font-weight:bold;
      box-sizing:border-box;
    }
    input[type="checkbox"]{width:auto;margin:0;}
    select{
      font-size:0.95rem;
      padding:6px;
      border-radius:8px;
      border:1px solid #ccc;
      background:#fff;
      font-weight:bold;
    }
    #alias{color:#ff6600;}
    #email{
      margin:10px;
      font-weight:bold;
      color:#006400;
      font-family:'Poppins',sans-serif;
    }
    #logo-bingo{width:200px;max-width:80vw;height:auto;margin-bottom:5px;}
    .action-btn{
      font-family:'Bangers',cursive;
      background:linear-gradient(#0a8800,#ffffff);
      color:white;
      border:3px solid #FFD700;
      border-radius:8px;
      text-shadow:2px 2px 4px #000;
      cursor:pointer;
      width:200px;
      height:40px;
      font-size:1.2rem;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:5px auto;
    }
    #cancelar{background:linear-gradient(orange,#ffffff);}
    #terms-container{margin:10px;font-size:0.8rem;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Poppins',sans-serif;}
    #terms-container label{display:flex;align-items:center;gap:4px;font-family:'Poppins',sans-serif;}
    #terms-container a{font-family:'Poppins',sans-serif;}
    #login-footer{position:absolute;bottom:0;left:0;right:0;text-align:center;font-family:'Poppins',sans-serif;}
    .nota-registro{
      font-family:'Poppins',sans-serif;
      font-size:0.7rem;
      color:#000;
      margin:4px 0 10px;
      max-width:260px;
      text-align:center;
      text-shadow:0 0 6px rgba(255,255,255,0.9);
      font-weight:400;
    }
    #fecha-hora,#derechos{font-size:0.7rem;font-family:'Poppins',sans-serif;}
    #derechos{font-size:0.6rem;}
    .celular-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      width:260px;
      max-width:90vw;
      margin:0 auto;
    }
    #codigo-pais{
      width:115px;
      flex:0 0 115px;
    }
    #celular{
      flex:1;
      width:100%;
      margin:5px 0;
    }
    .small-label{
      font-size:0.55rem;
      font-family:'Poppins',sans-serif;
      text-transform:uppercase;
      color:#444;
      letter-spacing:0.5px;
      margin-top:6px;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:80px;
      transform:translateX(-50%);
      background:rgba(0,128,0,0.92);
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      font-size:0.9rem;
      font-family:'Poppins',sans-serif;
      box-shadow:0 6px 18px rgba(0,0,0,0.35);
      opacity:0;
      pointer-events:none;
      transition:opacity 0.3s ease, transform 0.3s ease;
      z-index:12000;
    }
    .toast.mostrar{
      opacity:1;
      transform:translateX(-50%) translateY(-8px);
    }
  </style>
</head>
<body>
  <img id="logo-bingo" src="img/Logo-BingOnline-nuevo500p.png" />
  <h2>Registro de Jugador</h2>
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="apellido" placeholder="Apellido">
  <input type="text" id="alias" placeholder="Alias">
  <div class="celular-row">
    <select id="codigo-pais" aria-label="Código de país" required></select>
    <input type="tel" id="celular" placeholder="Número Celular" aria-label="Número celular" inputmode="numeric" pattern="[0-9]+" title="Ingresa solo números" required>
  </div>
  <p class="nota-registro">Nota: Sólo tu Alias será visible para los otros Jugadores, Tu nombre, Apellido, Número celular o Gmail serán confidenciales.</p>
  <div id="email"></div>
  <div class="small-label">CÓDIGO REFERIDO</div>
  <input type="text" id="codigo-referido" placeholder="Opcional" maxlength="12" style="text-transform:uppercase;">
  <div id="terms-container"><input type="checkbox" id="accept-terms"> <label for="accept-terms">Acepto <a href="terminos.html" target="_blank">términos y condiciones</a></label></div>
  <button id="registrar" class="action-btn">Registrarse</button>
  <button id="cancelar" class="action-btn">Cancelar</button>
  <div id="login-footer">
    <div id="fecha-hora"></div>
    <div id="derechos">Todos los derechos reservados ® Hexaservice 2025</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
  <script src="js/logoSwitcher.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notificationCenter.js"></script>
  <script src="js/timezone.js"></script>
  <script>
    const codigosPais=[
      {codigo:'VE',nombre:'Venezuela',prefijo:'+58',bandera:'🇻🇪'},
      {codigo:'CO',nombre:'Colombia',prefijo:'+57',bandera:'🇨🇴'},
      {codigo:'MX',nombre:'México',prefijo:'+52',bandera:'🇲🇽'},
      {codigo:'US',nombre:'Estados Unidos',prefijo:'+1',bandera:'🇺🇸'},
      {codigo:'AR',nombre:'Argentina',prefijo:'+54',bandera:'🇦🇷'},
      {codigo:'CL',nombre:'Chile',prefijo:'+56',bandera:'🇨🇱'},
      {codigo:'PE',nombre:'Perú',prefijo:'+51',bandera:'🇵🇪'}
    ];

    function poblarSelectCodigos(select){
      if(!select) return;
      codigosPais.forEach(pais=>{
        const opcion=document.createElement('option');
        opcion.value=pais.prefijo;
        opcion.textContent=`${pais.bandera||''} ${pais.nombre} (${pais.prefijo})`;
        select.appendChild(opcion);
      });
      select.value='+58';
    }

    function separarPrefijo(numero){
      const limpio=(numero||'').toString().replace(/[^0-9+]/g,'');
      const candidatos=[...codigosPais].sort((a,b)=>b.prefijo.length-a.prefijo.length);
      for(const pais of candidatos){
        const pref=pais.prefijo;
        if(limpio.startsWith(pref)){
          return {prefijo:pref,local:limpio.slice(pref.length)};
        }
        const prefSinMas=pref.replace('+','');
        if(prefSinMas && limpio.startsWith(prefSinMas)){
          return {prefijo:pref,local:limpio.slice(prefSinMas.length)};
        }
      }
      return {prefijo:selectCodigoPais ? selectCodigoPais.value || '+58' : '+58',local:limpio};
    }

    function obtenerNumeroCompleto(){
      const prefijo=selectCodigoPais ? (selectCodigoPais.value || '') : '';
      const local=document.getElementById('celular').value.trim().replace(/\D/g,'');
      return (prefijo||'')+local;
    }

    function generarCodigoPromocional(email, telefono){
      const local = (email || '').split('@')[0] || '';
      const letras = local.replace(/[^a-zA-Z]/g,'');
      let prefijo = letras.slice(0,2).toUpperCase();
      if(prefijo.length < 2){
        prefijo = (local.replace(/[^a-zA-Z0-9]/g,'').slice(0,2) || '').toUpperCase();
      }
      const digitos = (telefono || '').toString().replace(/\D/g,'');
      const sufijo = digitos.slice(-4);
      return `${prefijo}${sufijo}`.trim();
    }

    function parseFecha(valor){
      if(!valor) return null;
      const base = new Date(`${valor}T00:00:00`);
      if(Number.isNaN(base.getTime())) return null;
      return base;
    }

    function hoySinHora(){
      const ahora = new Date();
      return new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
    }

    function mostrarToast(texto){
      let toast = document.getElementById('toast-referral');
      if(!toast){
        toast = document.createElement('div');
        toast.id = 'toast-referral';
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.textContent = texto;
      toast.classList.add('mostrar');
      setTimeout(()=>toast.classList.remove('mostrar'), 3500);
    }

    async function obtenerCampanaActiva(){
      const snapshot = await db.collection('campanasReferidos').where('estado','==','ACTIVA').get();
      const hoy = hoySinHora();
      let activa = null;
      const batch = db.batch();
      let cambios = 0;
      snapshot.forEach(doc => {
        const data = doc.data() || {};
        const fin = parseFecha(data.fechaFin);
        if(fin && fin < hoy){
          batch.update(db.collection('campanasReferidos').doc(doc.id), { estado:'INACTIVA' });
          cambios += 1;
          return;
        }
        const inicio = parseFecha(data.fechaInicio);
        if(inicio && fin && inicio <= hoy && hoy <= fin && !activa){
          activa = { id: doc.id, ...data };
        }
      });
      if(cambios){ await batch.commit(); }
      return activa;
    }

    async function buscarUsuarioPorCodigo(codigo){
      const snapshot = await db.collection('users').where('codigoPromocional','==',codigo).limit(1).get();
      if(snapshot.empty) return null;
      const doc = snapshot.docs[0];
      return { id: doc.id, ...doc.data() };
    }

    async function actualizarBilletera(email, cartonesAgregar){
      if(!cartonesAgregar || cartonesAgregar <= 0) return;
      const ref = db.collection('Billetera').doc(email);
      await db.runTransaction(async tx => {
        const doc = await tx.get(ref);
        const data = doc.exists ? doc.data() || {} : {};
        const actuales = Number(data.CartonesGratis ?? data.cartonesGratis ?? 0) || 0;
        const nuevos = actuales + cartonesAgregar;
        tx.set(ref, { CartonesGratis: nuevos }, { merge:true });
      });
    }

    async function registrarReferido({campana, nuevoEmail, referidoEmail}){
      if(!campana || !referidoEmail || !nuevoEmail) return { premioReferidor: 0 };
      const ref = db.collection('Referidos').doc(referidoEmail).collection('campanas').doc(campana.id);
      let premioReferidor = 0;
      await db.runTransaction(async tx => {
        const doc = await tx.get(ref);
        const data = doc.exists ? doc.data() || {} : {};
        const total = Number(data.totalReferidos || 0) + 1;
        const premiosEntregados = Number(data.premiosEntregados || 0);
        const meta = Number(campana.referidosMin || 0);
        const premiosNuevoTotal = meta > 0 ? Math.floor(total / meta) : 0;
        const premiosPorDar = Math.max(premiosNuevoTotal - premiosEntregados, 0);
        if(premiosPorDar > 0){
          premioReferidor = premiosPorDar * (Number(campana.cartonesPremio || 0));
        }
        tx.set(ref, {
          totalReferidos: total,
          premiosEntregados: premiosEntregados + premiosPorDar,
          ultimoReferido: nuevoEmail,
          actualizadoEn: new Date().toISOString()
        }, { merge:true });
      });
      return { premioReferidor };
    }

    const selectCodigoPais=document.getElementById('codigo-pais');
    poblarSelectCodigos(selectCodigoPais);

    (async()=>{
      try{
        await initFirebase();
      }catch(err){
        console.error('No se pudo inicializar Firebase en registrarse.html', err);
        alert('No se pudo preparar el registro. Intenta nuevamente.');
        window.location.href='index.html';
        return;
      }
      auth.onAuthStateChanged(async user=>{
        if(!user){
          window.location.href='index.html';
          return;
        }
        document.getElementById('email').textContent = user.email || '';
        try{
          const doc = await db.collection('users').doc(user.email).get();
          if(doc.exists){
            const data = doc.data() || {};
            if(data.name) document.getElementById('nombre').value = data.name;
            if(data.apellido) document.getElementById('apellido').value = data.apellido;
            if(data.alias) document.getElementById('alias').value = data.alias;
            const celularGuardado = data.celular || data.numerocel;
            if(celularGuardado){
              const {prefijo,local}=separarPrefijo(celularGuardado.toString());
              if(selectCodigoPais){
                selectCodigoPais.value=prefijo;
              }
              document.getElementById('celular').value=local;
            }
          }
        }catch(loadErr){
          console.error('No se pudieron cargar datos previos del usuario', loadErr);
        }
      });
    })();
    function validarTexto(txt,max){
      return txt && txt.length<=max && /^[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+$/.test(txt);
    }
    const codigoReferidoInputEl = document.getElementById('codigo-referido');
    if(codigoReferidoInputEl){
      codigoReferidoInputEl.addEventListener('input', e=>{
        e.target.value = (e.target.value || '').toUpperCase();
      });
      const params = new URLSearchParams(window.location.search);
      const codigoParam = (params.get('codigo') || '').trim().toUpperCase();
      if(codigoParam){
        codigoReferidoInputEl.value = codigoParam;
      }
    }
    document.getElementById('registrar').addEventListener('click', async ()=>{
      const nombre = document.getElementById('nombre').value.trim();
      if(!nombre){ alert('Debes llenar el campo nombre'); document.getElementById('nombre').focus(); return; }
      if(!validarTexto(nombre,40)){ alert('Nombre inválido'); document.getElementById('nombre').focus(); return; }
      const apellido = document.getElementById('apellido').value.trim();
      if(!apellido){ alert('Debes llenar el campo Apellido'); document.getElementById('apellido').focus(); return; }
      if(!validarTexto(apellido,40)){ alert('Apellido inválido'); document.getElementById('apellido').focus(); return; }
      const alias = document.getElementById('alias').value.trim();
      if(!alias){ alert('Debes llenar el campo Alias'); document.getElementById('alias').focus(); return; }
      if(alias.length>60){ alert('Alias inválido'); document.getElementById('alias').focus(); return; }
      const celularLocal = document.getElementById('celular').value.trim().replace(/\D/g,'');
      if(!selectCodigoPais || !selectCodigoPais.value){ alert('Debes elegir un código de país'); selectCodigoPais.focus(); return; }
      if(!celularLocal){ alert('Debes agregar tu número celular'); document.getElementById('celular').focus(); return; }
      if(!document.getElementById('accept-terms').checked){
        alert('Para poder registrarte debes aceptar nuestros terminos y condiciones');
        return;
      }
      const user = auth.currentUser;
      if(!user){
        alert('Tu sesión ha expirado. Vuelve a iniciar sesión con Google para registrarte.');
        window.location.href='index.html';
        return;
      }
      const numeroCompleto=obtenerNumeroCompleto();
      const codigoPromocional = generarCodigoPromocional(user.email, numeroCompleto);
      const codigoReferido = (codigoReferidoInputEl?.value || '').trim().toUpperCase();
      let campanaActiva = null;
      let usuarioReferidor = null;
      if(codigoReferido){
        usuarioReferidor = await buscarUsuarioPorCodigo(codigoReferido);
        if(!usuarioReferidor){
          alert('Este código promocional no existe, coloca uno válido o deja en blanco');
          return;
        }
        if(usuarioReferidor.email === user.email || usuarioReferidor.id === user.email){
          alert('No puedes usar tu propio código promocional.');
          return;
        }
        campanaActiva = await obtenerCampanaActiva();
      }
      await db.collection('users').doc(user.email).set({
        name:nombre,
        apellido:apellido,
        alias:alias,
        celular:numeroCompleto,
        numerocel:numeroCompleto,
        email:user.email,
        photoURL:user.photoURL,
        role:'Jugador',
        aceptoNotificaciones:'NO',
        codigoPromocional,
        codigoReferidoUsado: codigoReferido || '',
        referidoPorEmail: usuarioReferidor ? (usuarioReferidor.email || usuarioReferidor.id || '') : '',
        campanaReferidosId: campanaActiva ? campanaActiva.id : ''
      });
      let delayRedirect = 0;
      if(codigoReferido && usuarioReferidor && campanaActiva){
        const cartonesNuevo = Number(campanaActiva.cartonesNuevo || 0) || 0;
        if(cartonesNuevo > 0){
          await actualizarBilletera(user.email, cartonesNuevo);
          mostrarToast(`¡Código exitoso! ganaste ${cartonesNuevo} cartones GRATIS`);
          delayRedirect = 1400;
        }
        const { premioReferidor } = await registrarReferido({
          campana: campanaActiva,
          nuevoEmail: user.email,
          referidoEmail: usuarioReferidor.email || usuarioReferidor.id
        });
        if(premioReferidor > 0){
          await actualizarBilletera(usuarioReferidor.email || usuarioReferidor.id, premioReferidor);
        }
      }
      if(delayRedirect){
        await new Promise(resolve => setTimeout(resolve, delayRedirect));
      }
      window.location.href='player.html';
    });
    document.getElementById('cancelar').addEventListener('click', ()=>{ window.location.href='index.html'; });
    initFechaHora('fecha-hora');
  </script>
</body>
</html>
