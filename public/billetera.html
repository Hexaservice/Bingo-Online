<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="img/favicon-32x32.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billetera</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://img.freepik.com/vectores-premium/padrao-sem-costura-com-simbolos-de-dolar-e-porcentagem_637741-777.jpg');
      background-repeat: repeat;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    .menu-btn {
      width: 250px;
      height: 60px;
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      background: rgba(0, 170, 255, 0.8);
      color: white;
      border: 4px solid #FFD700;
      border-radius: 10px;
      text-shadow: 2px 2px 4px #000;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      margin: 5px;
    }
    .menu-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }

    .back-btn {
      position: fixed;
      top: 5px;
      left: 5px;
      width: 120px;
      height: 40px;
      background: orange;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      z-index:1000;
    }
    #creditos-container{margin:10px auto;}
    #creditos-title,#creditos-valor{font-family:"Bangers",cursive;color:#fff;}
    #creditos-title{font-size:2rem;text-shadow:0 0 8px #ff8c00;animation:pulse 1s infinite;}
    #creditos-valor{font-size:2.4rem;animation:pulse 1s infinite;}
    #creditos-info{display:flex;align-items:center;justify-content:center;gap:15px;}
    #cartones-gratis{font-family:"Bangers",cursive;color:#fff;font-size:2rem;text-shadow:0 0 8px #00008B;animation:pulse 1s infinite;display:flex;align-items:center;gap:3px;}
    #carton-icon{width:24px;height:24px;}
    #creditos-valor.verde{text-shadow:0 0 5px #006600;}
    #creditos-valor.rojo{text-shadow:0 0 5px red;}
    @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
    table {
      margin: 10px auto;
      border-collapse: collapse;
      width:100%;
      overflow-x:auto;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 4px 8px;
      font-size:0.8rem;
      word-break:break-word;
    }
    #tabla-transacciones{width:100%;background:#fff;font-family:Calibri, Arial, sans-serif;margin:5px 0;}
    #tabla-transacciones th,#tabla-transacciones td{font-size:0.9rem;padding:4px 6px;font-weight:bold;}
    #tabla-transacciones th:nth-child(1),#tabla-transacciones td:nth-child(1){width:40px;font-size:0.8rem;}
    #tabla-transacciones th:nth-child(2),#tabla-transacciones td:nth-child(2){width:120px;}
    #tabla-transacciones th:nth-child(3),#tabla-transacciones td:nth-child(3){width:100px;}
    #tabla-transacciones th:nth-child(4),#tabla-transacciones td:nth-child(4){width:140px;}
    #tabla-transacciones th:nth-child(5),#tabla-transacciones td:nth-child(5){width:120px;}
    #tabla-transacciones select,#tabla-transacciones input{font-size:0.9rem;width:100px;}
    #tabla-transacciones th:nth-child(3) input{width:100px;}
    #tabla-transacciones thead th{position:sticky;top:0;background:#f7f7f7;z-index:2;}
    #datos-content{display:none;}
    #transacciones-content{overflow-x:auto;display:none;max-height:70vh;overflow-y:auto;position:relative;}
    #transacciones-section .switch{margin-top:4px;visibility:hidden;}
    #tabla-bancos{background:rgba(255,255,255,0.95);}
    #tabla-bancos th,#tabla-bancos td{
      font-weight:bold;
      color:#00008B;
      text-shadow:0 0 4px #fff;
      text-align:center;
    }
    #banco-retiro{font-weight:bold;color:#00008B;text-shadow:0 0 4px #fff;}
    td.nota-estado{position:relative;cursor:pointer;}
    td.nota-estado::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      width:0;
      height:0;
      border-top:8px solid red;
      border-right:8px solid transparent;
    }
    #modal-detalle{
      position:fixed;
      top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.5);
      display:none;align-items:center;justify-content:center;
      z-index:2000;
    }
    #modal-detalle .contenido{
      background:#fff;padding:15px;border-radius:8px;
      font-family:Calibri, Arial, sans-serif;font-weight:bold;text-align:left;
    }
    #modal-detalle button{margin-top:10px;font-weight:bold;}
    @media (max-width:480px) and (orientation:portrait){
      body{padding:2px;}
      #tabla-transacciones{margin:2px 0;width:100%;}
      #tabla-transacciones th,#tabla-transacciones td{font-size:0.8rem;padding:1px 2px;}
      #tabla-transacciones th:nth-child(1),#tabla-transacciones td:nth-child(1){width:40px;font-size:0.7rem;}
      #tabla-transacciones th:nth-child(2),#tabla-transacciones td:nth-child(2){width:70px;}
      #tabla-transacciones th:nth-child(3),#tabla-transacciones td:nth-child(3){width:50px;}
      #tabla-transacciones th:nth-child(4),#tabla-transacciones td:nth-child(4){width:80px;}
      #tabla-transacciones th:nth-child(5),#tabla-transacciones td:nth-child(5){width:90px;}
      #tabla-transacciones select,#tabla-transacciones input{width:80px;font-size:0.8rem;}
      #tabla-transacciones th:nth-child(3) input{width:50px;}
    }

    @media (orientation:landscape){
      #tabla-transacciones th,#tabla-transacciones td{font-size:0.9rem;}
      #tabla-transacciones th:nth-child(1),#tabla-transacciones td:nth-child(1){width:40px;font-size:0.8rem;}
    }
    .tabs {
      margin-top:20px;
    }
    .tab-buttons{display:flex;justify-content:center;}

    .tab-buttons button {
      flex:1;max-width:150px;padding:12px 0;margin:0 2px;font-family:"Bangers",cursive;font-size:1.2rem;border:1px solid #333;border-bottom:none;border-radius:10px 10px 0 0;color:white;cursor:pointer;text-shadow:2px 2px 4px #000;
    }
    .tab-buttons button[data-tab="depositar"] { background:#0a8800; }
    .tab-buttons button[data-tab="retirar"] { background:#cc0000; }
    .tab-buttons button.active { filter:brightness(1.2); position:relative; top:1px; }
    .tab-content { display:none; margin-top:0; border:1px solid #333; border-radius:0 10px 10px 10px; padding:10px; }
    .tab-content.active { display:block; }
    input, select, textarea {
      font-size:1rem;
      padding:5px;
      margin:5px auto;
      display:block;
      width:250px;
      text-align:center;
    }
    #banco-deposito,#monto-deposito,#referencia,#comentario-deposito{background:#fff;}
    #banco-deposito,#monto-deposito,#referencia{font-weight:bold;}
    #monto-deposito{color:#006400;}
    #referencia{color:#4B0082;}
    #comentario-deposito{color:#333;font-weight:normal;}
    #mis-datos input, #mis-datos select {
      width:260px;
    }
    #banco,#cuenta,#cedula,#pagomovil{font-weight:bold;background:#fff !important;}
    #banco{color:#00008B;width:100%;box-sizing:border-box;}
    #cuenta{color:#006400;width:100%;box-sizing:border-box;}
    #cedula{color:#4B0082;}
    #pagomovil{color:#FF8C00;}
    .campo{display:flex;flex-direction:column;align-items:center;width:260px;margin:0 auto;}
    #session-info {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      font-size: 0.7rem;
    }
    #user-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    #logout-link {
      font-family: Calibri, Arial, sans-serif;
      margin-left: 5px;
      font-size: 0.7rem;
      color: #007bff;
      text-decoration: underline;
    }
    #mis-datos h3{
      font-size:1.3rem;
      margin:0 0 5px;
    }
    #depositar h3{
      margin:0 0 5px;
    }
    #depositar table{
      margin:5px auto;
    }
    #datos-pm{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;}
    #datos-pm .campo{flex:1 0 120px;max-width:150px;width:auto;}
    #datos-pm .campo input{width:100%;}
    #tipo-cuenta{display:flex;justify-content:center;gap:5px;}
    #tipo-cuenta label{display:flex;align-items:center;gap:3px;}
    #tipo-cuenta input{width:auto;margin:0;}
    .switch{
      position:relative;
      display:inline-block;
      width:42px;
      height:24px;
    }
    .switch input{display:none;}
    .slider{
      position:absolute;
      cursor:pointer;
      top:0;left:0;right:0;bottom:0;
      background-color:#ccc;
      transition:.4s;
      border-radius:24px;
    }
    .slider:before{
      position:absolute;
      content:"";
      height:18px;width:18px;left:3px;bottom:3px;
      background-color:white;
      transition:.4s;
      border-radius:50%;
    }
    input:checked + .slider{background-color:#4caf50;}
    input:checked + .slider:before{transform:translateX(18px);}
    #guardar-datos {
      font-family: 'Bangers', cursive;
      font-size: 1.2rem;
      background: #0a8800;
      color: white;
      border: 3px solid #FFD700;
      border-radius: 8px;
      text-shadow: 2px 2px 4px #000;
      width: 200px;
      cursor:pointer;
    }
    #btn-depositar {
      font-family: 'Bangers', cursive;
      background: linear-gradient(#0a8800, #ffffff);
      color: white;
      border: 3px solid #FFD700;
      border-radius: 8px;
      text-shadow:2px 2px 4px #000;
      font-size:1.2rem;
      width:200px;
      cursor:pointer;
    }
    #btn-retirar {
      font-family: 'Bangers', cursive;
      background: linear-gradient(#cc0000, #ffffff);
      color: white;
      border: 3px solid #FFD700;
      border-radius: 8px;
      text-shadow:2px 2px 4px #000;
      font-size:1.2rem;
      width:200px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div id="session-info" style="display:none;">
    <img id="user-pic" referrerpolicy="no-referrer" crossorigin="anonymous" src="" alt="Usuario" />
    <a href="#" id="logout-link">Cerrar sesión</a>
  </div>
  <button id="volver-btn" class="menu-btn back-btn" data-compact-back="true">&#9664; Volver</button>
  <div id="creditos-container">
    <div id="creditos-title">CREDITOS</div>
    <div id="creditos-info">
      <div id="creditos-valor" class="rojo">0</div>
      <div id="cartones-gratis">
        <img id="carton-icon" src="https://cdn-icons-png.flaticon.com/32/5065/5065890.png" alt="Ticket">
        <span id="cartones-valor">0</span>
      </div>
    </div>
  </div>

  <div id="mis-datos">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
      <h3 style="margin:0;">Mis datos bancarios</h3>
      <label class="switch">
        <input type="checkbox" id="toggle-datos">
        <span class="slider"></span>
      </label>
    </div>
    <div id="datos-content">
      <div class="campo">
        <select id="banco">
          <option value="" disabled selected>Banco</option>
        </select>
      </div>
      <div class="campo">
        <input type="text" id="cuenta" placeholder="N° Cuenta Bancaria" inputmode="numeric">
      </div>
      <div id="tipo-cuenta">
        <label><input type="radio" name="tipo-cuenta" value="Ahorro"> Ahorro</label>
        <label><input type="radio" name="tipo-cuenta" value="Corriente"> Corriente</label>
      </div>
      <div id="datos-pm">
        <div class="campo">
          <input type="text" id="cedula" placeholder="Cédula" inputmode="numeric">
        </div>
        <div class="campo">
          <input type="text" id="pagomovil" placeholder="Número Pago móvil" inputmode="tel">
        </div>
      </div>
      <button id="guardar-datos">Guardar Datos</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab-buttons">
      <button data-tab="depositar" class="active">DEPÓSITOS</button>
      <button data-tab="retirar">RETIROS</button>
    </div>
    <div id="depositar" class="tab-content active">
      <h3>Bancos habilitados para depósitos</h3>
      <table id="tabla-bancos">
        <thead>
          <tr><th>Banco</th><th>N° Pago Móvil</th><th>Cédula</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <select id="banco-deposito">
        <option value="" disabled selected>Banco donde transferiste</option>
      </select>
      <input type="number" id="monto-deposito" placeholder="Monto">
        <input type="text" id="referencia" placeholder="Referencia (últimos 5 dígitos)" inputmode="numeric" pattern="\d*" maxlength="5" oninput="this.value=this.value.replace(/\D/g,"");">
      <textarea id="comentario-deposito" placeholder="Comentario (opcional)"></textarea>
      <button id="btn-depositar">Solicitar Depósito</button>
    </div>
    <div id="retirar" class="tab-content">
      <label id="banco-retiro"></label>
      <input type="number" id="monto-retiro" placeholder="Monto" step="0.01">
      <div id="descuentos-retiro">
        <div id="descuento-bancario" style="font-weight:bold;">
          Descuento Bancario <span id="porcentaje-retiro" style="color:#00008B;"></span>% por retiro bancario
        </div>
        <div id="descuento-admin" style="font-weight:bold;">
          Descuento del <span id="porcentaje-admin" style="color:#00008B;"></span>% por gestión administrativa
        </div>
      </div>
      <input type="number" id="monto-retiro-neto" placeholder="Monto a recibir" readonly>
      <textarea id="comentario-retiro" placeholder="Comentario (opcional)"></textarea>
      <button id="btn-retirar">Retirar</button>
    </div>
  </div>
  <div id="transacciones-section">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
      <h3 style="margin:0;">Mis transacciones</h3>
      <label class="switch">
        <input type="checkbox" id="toggle-transacciones">
        <span class="slider"></span>
      </label>
    </div>
    <div id="transacciones-content">
      <table id="tabla-transacciones">
        <thead>
          <tr>
            <th>N°</th>
            <th>
              <select id="filtro-tipo">
                <option value="">TIPO</option>
                <option value="deposito">DEPOSITO</option>
                <option value="retiro">RETIRO</option>
                <option value="premio">PREMIO</option>
              </select>
            </th>
            <th><input id="filtro-monto" type="number" placeholder="MONTO"></th>
            <th><input id="filtro-fecha" type="date"></th>
            <th>
              <select id="filtro-estado">
                <option value="">ESTADO</option>
                <option value="PENDIENTE">Pendiente</option>
                <option value="APROBADO">Aprobado</option>
                <option value="ANULADO">Anulado</option>
              </select>
            </th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="modal-detalle"><div class="contenido"></div></div>

  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notificationCenter.js"></script>
  <script src="js/timezone.js"></script>
  <script>
    ensureAuth();
    initServerTime();
    const transacciones=[];
    let porcentajeRetiro=0, porcentajeAdministra=0;
    let creditosTotales=0, creditosTransito=0, creditosDisponibles=0;
    let numeroWhatsappDestino='';
    let numeroWhatsappCargado=false;

    function mostrarSwitchTransacciones(){
      const contenedorSwitch=document.querySelector('#transacciones-section .switch');
      if(contenedorSwitch){
        contenedorSwitch.style.visibility='visible';
      }
    }

    function toNumberSafe(valor, defecto=0){
      const numero=parseFloat(valor);
      return Number.isFinite(numero)?numero:defecto;
    }

    function formatearMontoPantalla(valor){
      const numero=toNumberSafe(valor,0);
      return numero.toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
    }

    function actualizarResumenCreditos(data){
      const total=toNumberSafe(data?.creditos,0);
      const enTransito=Math.max(0,toNumberSafe(data?.creditostransito,0));
      const disponibles=Math.max(0,total-enTransito);
      creditosTotales=total;
      creditosTransito=enTransito;
      creditosDisponibles=disponibles;
      const valorEl=document.getElementById('creditos-valor');
      if(valorEl){
        valorEl.textContent=formatearMontoPantalla(disponibles);
        valorEl.className=disponibles>0?'verde':'rojo';
        valorEl.dataset.total=total.toString();
        valorEl.dataset.transito=enTransito.toString();
        valorEl.dataset.disponibles=disponibles.toString();
      }
      return disponibles;
    }

    async function refrescarResumenBilletera(){
      const user=auth.currentUser;
      if(!user) return;
      const billeteraRef=db.collection('Billetera').doc(user.email);
      const snap=await billeteraRef.get();
      if(snap.exists){
        actualizarResumenCreditos(snap.data()||{});
      }
    }

    function cargarBancosBilletera(){
      db.collection('Bancos').where('categoria','==','Jugadores').where('estado','==','Activo').onSnapshot(snap=>{
        const sel=document.getElementById('banco');
        sel.innerHTML='<option value="" disabled selected>Banco</option>';
        snap.forEach(doc=>{
          const nombre=doc.data().nombre||doc.id;
          const opt=document.createElement('option');
          opt.value=nombre;
          opt.textContent=nombre;
          sel.appendChild(opt);
        });
      });
    }

    function cargarBancosBingo(){
      db.collection('Bancos').where('categoria','==','Bingo').where('estado','==','Activo').onSnapshot(snap=>{
      const tbody=document.querySelector('#tabla-bancos tbody');
      const sel=document.getElementById('banco-deposito');
      sel.innerHTML='<option value="" disabled selected>Banco donde transferiste</option>';
      tbody.innerHTML='';
      snap.forEach(doc=>{
        const nombre=doc.data().nombre||doc.id;
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${nombre}</td><td>${doc.data().pagomovil||''}</td><td>${doc.data().cedula||''}</td>`;
        tbody.appendChild(tr);
        const opt=document.createElement('option');
        opt.value=nombre;
        opt.textContent=nombre;
        sel.appendChild(opt);
      });
    });
    }

    function normalizarSoloNumeros(valor){
      return (valor||'').toString().replace(/\D+/g,'');
    }

    function normalizarPagoMovil(valor){
      let limpio=(valor||'').toString().replace(/\s+/g,'');
      const tieneMas=limpio.startsWith('+');
      limpio=limpio.replace(/\+/g,'');
      limpio=limpio.replace(/\D+/g,'');
      return (tieneMas?'+':'')+limpio;
    }

    function normalizarNumeroWhatsapp(valor){
      const texto=(valor||'').toString();
      let limpio=texto.replace(/[^0-9+]/g,'');
      if(!limpio) return '';
      if(limpio.startsWith('+')){
        limpio='+'+limpio.slice(1).replace(/\+/g,'');
      }else{
        limpio=limpio.replace(/\+/g,'');
      }
      return limpio;
    }

    function construirEnlaceWhatsapp(numero,mensaje){
      const normalizado=normalizarNumeroWhatsapp(numero);
      if(!normalizado) return '';
      const destino=normalizado.startsWith('+')?normalizado.slice(1):normalizado;
      const texto=encodeURIComponent((mensaje||'').toString());
      return `https://wa.me/${destino}${texto?`?text=${texto}`:''}`;
    }

    function obtenerNombreUsuario(){
      const user=auth.currentUser;
      const nombre=(user?.displayName||'').trim();
      if(nombre) return nombre;
      return (user?.email||'').trim();
    }

    async function obtenerNumeroWhatsappConfigurado(){
      if(numeroWhatsappDestino){
        numeroWhatsappCargado=true;
        return numeroWhatsappDestino;
      }
      if(numeroWhatsappCargado) return '';
      try{
        const snap=await db.collection('Variablesglobales').doc('Parametros').get();
        if(snap.exists){
          const data=snap.data()||{};
          numeroWhatsappDestino=normalizarNumeroWhatsapp(data.numeroWhatsapp||data.numero_whatsapp||'');
        }
      }catch(error){
        console.error('No se pudo cargar el número de WhatsApp configurado',error);
      }
      numeroWhatsappCargado=true;
      return numeroWhatsappDestino;
    }

    const ICONOS_WHATSAPP={
      // Se usan emojis ampliamente soportados para que se muestren correctamente en WhatsApp
      solicitudDeposito:'💵',
      solicitudRetiro:'💰'
    };

    function construirMensajeWhatsapp(tipo,info){
      const correo=auth.currentUser?.email||'';
      const nombre=obtenerNombreUsuario();
      const lineas=[];
      const formatearEnteroSeguro=valor=>Math.trunc(toNumberSafe(valor,0)).toString();

      if(tipo==='deposito'){
        lineas.push(`${ICONOS_WHATSAPP.solicitudDeposito} *SOLICITUD DE DEPÓSITO*`);
        if(correo) lineas.push(`Correo: ${correo}`);

    function formatearFecha(str){
      if(!str) return '';
      if(str.includes('/')){
        const [d,m,a]=str.split('/');
        return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${a.padStart(4,'0')}`;
      }
      const [a,m,d]=str.split('-');
      return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${a}`;
    }

    function aHora24(str){
      if(!str) return '00:00';
      str=str.toLowerCase().replace(/\./g,'').replace(/\s+/g,'');
      const m=str.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?(a|p)?m?/);
      if(!m) return str;
      let h=parseInt(m[1],10);const min=m[2];const ap=m[4];
      if(ap==='p'&&h<12)h+=12;
      if(ap==='a'&&h===12)h=0;
      return `${String(h).padStart(2,'0')}:${min}`;
    }

    function parseFechaHora(f,h){
      const [d,m,a]=f.split('/');
      return new Date(`${a}-${m}-${d}T${aHora24(h)}:00`);
    }

    function formatearHora(str){
      if(!str) return '';
      const [h24,min] = aHora24(str).split(':');
      let h=parseInt(h24,10);
      const ampm=h>=12?'pm':'am';
      h=h%12; if(h===0) h=12;
      return `${h}:${min} ${ampm}`;
    }

    function normalizarTipoTransaccion(data){
      const tipoCrudo = (data.tipotrans || '').toString().trim().toLowerCase();
      const origen = (data.origen || '').toString().trim().toLowerCase();
      const referencia = (data.referencia || '').toString().trim().toUpperCase();
      const sorteoNombre = (data.sorteoNombre || '').toString().trim().toLowerCase();
      const rolInterno = (data.rolInterno || data.rolinterno || '').toString().trim().toLowerCase();
      const esRolEspecial = ['desarrolladores','desarrollador','agencia'].includes(rolInterno);

      if(['retiro','deposito','ajuste_colaborador'].includes(tipoCrudo)){
        return tipoCrudo;
      }

      let tipo = tipoCrudo;

      if(origen === 'pagos_administracion' && tipo !== 'ajuste_colaborador'){
        tipo = 'pago';
      } else if(origen === 'premios_jugadores'){
        if(!tipo || tipo === 'pago'){
          tipo = 'premio';
        }
      }

      if(esRolEspecial && tipo !== 'ajuste_colaborador'){
        if(!tipo || tipo === 'premio' || tipo === 'pago' || !tipoCrudo){
          if(!origen || origen === 'pagos_administracion' || sorteoNombre.includes('pago') || referencia === 'PAGO'){
            tipo = 'pago';
          }
        }
      }

      if((!tipo || tipo === 'premio' || tipo === 'pago')){
        if(referencia === 'PAGO' && tipo !== 'pago'){
          tipo = 'pago';
        } else if(referencia === 'PREMIO' && tipo !== 'premio'){
          tipo = 'premio';
        }
      }

      if(!tipo || (tipo !== 'pago' && tipo !== 'premio')){
        if(sorteoNombre.includes('pago')){
          tipo = 'pago';
        } else if(sorteoNombre.includes('premio')){
          tipo = 'premio';
        }
      }

      if(!tipo){
        tipo = 'premio';
      }

      return tipo;
    }

      });

    async function ejecutarRetiro(monto,montoFinal, comentario){
      const user=auth.currentUser;
      await initServerTime();
      const billeteraRef=db.collection('Billetera').doc(user.email);
      const transaccionRef=db.collection('transacciones').doc();
      const data={
        tipotrans:'retiro',
        bancoreceptor:'',
        MontoSolicitado:monto,
        Monto:montoFinal,
        referencia:'',
        comentario:comentario,
        estado:'PENDIENTE',
        IDbilletera:user.email,
        fechasolicitud:fechaActual(),
        horasolicitud:horaActual(),
        usuariogestor:'',
        rolusuario:'',
        fechagestion:'',
        horagestion:'',
        nota:''
      };
      let billeteraData=null;
      try{
        await db.runTransaction(async tx=>{
          const billeteraSnap=await tx.get(billeteraRef);
          billeteraData=billeteraSnap.exists?(billeteraSnap.data()||{}):{};
          const bancoSeleccionado=(billeteraData.banco||'').toString();
          const creditosActual=toNumberSafe(billeteraData.creditos,0);
          const transitoActual=Math.max(0,toNumberSafe(billeteraData.creditostransito,0));
          const disponibles=Math.max(0,creditosActual-transitoActual);
          if(monto>disponibles){
            throw new Error('CREDITOS_INSUFICIENTES');
          }
          const nuevoTransito=transitoActual+monto;
          if(!data.bancoreceptor){
            data.bancoreceptor=bancoSeleccionado;
          }
          tx.set(billeteraRef,{creditostransito:nuevoTransito},{merge:true});
          tx.set(transaccionRef,data);
        });
      }catch(error){
        if(error?.message==='CREDITOS_INSUFICIENTES'){
          throw new Error('CREDITOS_INSUFICIENTES');
        }
        console.error('No se pudo registrar el retiro',error);
        throw error;
      }
      await refrescarResumenBilletera();
      alert('Solicitud enviada, una vez validada se transferirá a tu pago móvil');
      limpiarCamposTransaccion('retiro');
      cargarTransacciones();
      return { data, billetera: billeteraData };
    }

    document.getElementById('btn-retirar').addEventListener('click', async () => {
      if(!await validarDatosBancarios()) return;
      const montoStr=document.getElementById('monto-retiro').value.trim();
      const monto=parseFloat(montoStr);
      if(!montoStr || isNaN(monto) || monto<=0){alert('Ingrese un monto válido');document.getElementById('monto-retiro').focus();return;}
      if(monto>creditosDisponibles){ alert(`El monto supera los créditos disponibles (${formatearMontoPantalla(creditosDisponibles)})`); return; }
      const montoFinal=monto - (monto*porcentajeRetiro/100) - (monto*porcentajeAdministra/100);
      document.getElementById('monto-retiro-neto').value = montoFinal>0 ? montoFinal.toFixed(2) : '';
      const comentarioRetiro=document.getElementById('comentario-retiro').value.trim();
      if(await confirm(`¿Confirmas la solicitud de retiro por ${montoFinal.toFixed(2)}?`)){
        try{
          const resultado=await ejecutarRetiro(monto,montoFinal, comentarioRetiro);
          await notificarSolicitudWhatsapp('retiro',{
            montoSolicitado:monto,
            montoNeto:montoFinal,
            comentario:comentarioRetiro,
            banco:resultado?.billetera?.banco||resultado?.data?.bancoreceptor||'',
            pagomovil:resultado?.billetera?.pagomovil||'',
            cuenta:resultado?.billetera?.cuenta||''
          });
        }catch(error){
          if(error?.message==='CREDITOS_INSUFICIENTES'){
            await refrescarResumenBilletera();
            alert('El saldo disponible cambió. Inténtalo nuevamente.');
          }else{
            alert('No se pudo registrar la solicitud de retiro. Inténtalo nuevamente.');
          }
        }
      }
    });

    document.getElementById('volver-btn').addEventListener('click',()=>{
      window.location.href='player.html';
    });

    </script>
    <script>
      document.addEventListener('DOMContentLoaded',()=>{
      const toggle=document.getElementById('toggle-datos');
      const datos=document.getElementById('datos-content');
      const toggleT=document.getElementById('toggle-transacciones');
      const transDiv=document.getElementById('transacciones-content');

      function actualizarVisibilidad(){
        datos.style.display=toggle.checked?'block':'none';
      }
      function visTrans(){
        transDiv.style.display=toggleT.checked?'block':'none';
      }
      toggle.addEventListener('change',actualizarVisibilidad);
      toggleT.addEventListener('change',visTrans);
      let debeAbrirDatos=false;
      try{
        if(sessionStorage.getItem('abrirDatosBancarios')==='1'){
          debeAbrirDatos=true;
          sessionStorage.removeItem('abrirDatosBancarios');
        }
      }catch(error){
        console.warn('No se pudo verificar la instrucción para abrir los datos bancarios',error);
      }
      if(debeAbrirDatos){
        toggle.checked=true;
      }
      actualizarVisibilidad();
      toggleT.checked=true;
      visTrans();
      if(debeAbrirDatos){
        setTimeout(()=>{
          const primerCampo=document.getElementById('banco');
          if(primerCampo){
            primerCampo.focus();
          }
        },0);
      }
    });
  </script>
  <script src="js/backNavigation.js"></script>
</body>
