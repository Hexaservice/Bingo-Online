<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="img/favicon-32x32.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Online</title>
  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
     		
      body {
          font-family: 'Poppins', sans-serif;
          background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)),
                            url('img/fondo-dinero-porcentage.jpg');
          background-repeat: repeat;
          background-size: auto;
          background-position: 0 0, 0 0;
          animation: fondo-movimiento 120s linear infinite;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          min-height: 100vh;
          text-align: center;
          margin: 0;
          padding-top: clamp(20px, 6vh, 60px);
      }
		
      @keyframes fondo-movimiento {
          0% {
              background-position: 0 0, 0 0;
          }
          100% {
              background-position: 0 0, -600px 600px;
          }
      }

      h2 {
          font-size: 2.5rem;
          color: #ffcc00;
          text-shadow: 3px 3px 6px #000;
      }
      table {
			margin: 20px auto;
			border-collapse: collapse;
			background: rgba(255, 255, 255, 0.9);
			border-radius: 15px; /* Bordes redondeados */
			border: 15px solid #004d00; /* Borde externo verde oscuro */
			padding: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* Sombra para mejorar el efecto */
	  }
      th {
          font-size: 2rem;
          color: #ff6600;
          text-shadow: 2px 2px 4px #000;
      }
      th, td {
			border: 2px solid black;
			width: 60px;
			height: 60px;
			text-align: center;
			font-weight: bold;
		}
      /* Estilo de los selects dentro del cartón */
      #bingo-board select {
          width: 100%;
          font-size: 2rem;
          font-weight: bold;
          padding: 5px;
          text-align: center;
          border: none;
          background: transparent;
          outline: none;
          -webkit-appearance: none;
          -moz-appearance: none;
          appearance: none;
      }
      /* Menú desplegable de sorteos visible */
      #select-sorteo {
          width: 220px;
          font-size: 1.1rem;
          padding: 5px 10px;
          text-align: center;
          border: 1px solid #333;
          border-radius: 5px;
          background: #fff;
          -webkit-appearance: menulist;
          -moz-appearance: menulist;
          appearance: auto;
      }
      .sorteo-info, #valor-carton, #creditos-info {
          margin: 5px 0;
          font-family: 'Poppins', sans-serif;
          font-size: 1rem;
          color: #000;
      }
      .sorteo-info {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
      }
      #info-carton {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          margin: 5px 0;
      }
      #info-text {
          display: flex;
          flex-direction: column;
          text-align: left;
      }
      #creditos-info {
          display: flex;
          align-items: center;
          gap: 5px;
      }
      #fecha-hora-sorteo {
          display: flex;
          flex-direction: column;
          text-align: left;
      }
      #ir-billetera-btn {
          font-family: 'Bangers', cursive;
          background: linear-gradient(#0a8800, #ffffff);
          color: white;
          border: 3px solid #FFD700;
          border-radius: 8px;
          text-shadow: 2px 2px 4px #000;
          font-size: 1.2rem;
          width: 200px;
          cursor: pointer;
      }
      .free {
          background-color: #ffcc00;
          font-weight: bold;
      }
      button {
          padding: 10px 20px;
          font-size: 18px;
          background: #ff6600;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          align: center;
      }
      button:hover {
          background: #cc5500;
      }

      /* Estilos para el login */
      #login-container {
          position: relative;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
      }
      #logo-bingo {
          width: 250px;
          max-width: 80vw;
          height: auto;
          margin-bottom: 15px;
      }
      #menu-logo {
          width: clamp(180px, 28vw, 280px);
          height: auto;
          margin-bottom: clamp(6px, 2vh, 20px);
      }
      #login-footer {
          position: relative;
          margin-top: 20px;
          text-align: center;
      }
      #login-btn {
          width: 220px;
          height: 80px;
          font-family: 'Bangers', cursive;
          font-size: 1.6rem;
          background: rgba(160, 0, 255, 0.8);
          color: white;
          border: 4px solid #FFD700;
          border-radius: 10px;
          text-shadow: 2px 2px 4px #000;
          text-transform: uppercase;
          cursor: pointer;
          transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      }
      #login-btn:hover {
          transform: scale(1.05);
          box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
      }
      #login-btn:active {
          transform: scale(0.95);
          box-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
      }

      /* Estilos para botones del menú principal */
      .menu-btn {
          width: 250px;
          height: 60px;
          font-family: 'Bangers', cursive;
          font-size: 1.4rem;
          background: rgba(0, 170, 255, 0.8);
          color: white;
          border: 4px solid #FFD700;
          border-radius: 10px;
          text-shadow: 2px 2px 4px #000;
          text-transform: uppercase;
          cursor: pointer;
          transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      }
      .view {
          position: relative;
          width: 100%;
      }
      .menu-btn:hover {
          transform: scale(1.05);
          box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
      }
      .menu-btn:active {
          transform: scale(0.95);
          box-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
      }

      /* Posicionamiento y estilos del menú */
      #main-menu {
          position: relative;
          width: 100%;
      }
      #menu-buttons {
          margin: clamp(10px, 4vh, 40px) auto 0;
          display: grid;
          grid-template-columns: minmax(120px, 1fr) minmax(220px, 1.2fr) minmax(120px, 1fr);
          align-items: center;
          justify-items: center;
          gap: clamp(12px, 3vw, 36px);
          width: min(95vw, 980px);
      }
      #menu-buttons h3 {
          margin: 0;
          font-size: clamp(1.6rem, 2.4vw, 2.2rem);
          font-family: 'Bangers', cursive;
          color: #0056ff;
          text-shadow: 0 0 8px #ffd700, 0 0 16px rgba(255, 215, 0, 0.8);
      }
      #menu-logo, #menu-buttons h3 {
          grid-column: 1 / -1;
      }

      .menu-imagen {
          width: clamp(140px, 26vw, 220px);
          height: auto;
          cursor: pointer;
          transition: transform 0.25s ease, filter 0.25s ease;
          filter: drop-shadow(0 0 6px rgba(0, 0, 0, 0.35));
      }
      .menu-imagen:focus,
      .menu-imagen:hover {
          transform: scale(1.04);
          filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.6));
          outline: none;
      }
      #boton-sorteo {
          grid-column: 2;
          width: clamp(220px, 48vw, 420px);
      }
      #boton-jugar {
          grid-column: 1;
          grid-row: 3;
      }
      #boton-billetera {
          grid-column: 3;
          grid-row: 3;
      }
      #boton-perfil {
          grid-column: 1;
          grid-row: 4;
      }
      #boton-mensajes {
          grid-column: 3;
          grid-row: 4;
      }

      #carton-screen {
          position: relative;
          width: 100%;
          margin-top: 70px;
      }

      .back-btn {
          position: fixed;
          top: 5px;
          left: 5px;
          width: 120px;
          height: 40px;
          background: orange;
          display:flex;
          white-space: nowrap;
          align-items:center;
          justify-content:center;
          gap:5px;
          z-index: 1100;
      }
      #salir-super-btn { background: red; border:4px solid orange; }
      #logout-link {
          font-family: Calibri, Arial, sans-serif;
          color: #007bff;
          text-decoration: underline;
          cursor: pointer;
          font-size: 0.7rem;
          margin-left: 5px;
      }
      #session-info {
          position: fixed;
          top: 10px;
          right: 10px;
          display: flex;
          align-items: center;
          font-size: 0.7rem;
          z-index: 1000;
      }
      #user-data {
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          margin-right: 5px;
      }
      #user-name, #user-email {
          color: #333;
          text-shadow: 1px 1px 2px #0000;
          font-family: Calibri, Arial, sans-serif;
          font-size: 0.7rem;
      }
      #fecha-hora, #derechos {
          font-size: 0.7rem;
          text-align: center;
          color: #000;
      }
      #derechos {
          font-size: 0.6rem;
      }
      @media (max-width: 600px) {
          table {
              width: 90%;
          }
          th, td {
              width: 50px;
              height: 50px;
          }
          select {
              font-size: 1.5rem;
          }
      }
      @media (max-width: 900px) {
          #menu-buttons {
              grid-template-columns: repeat(2, minmax(0, 1fr));
          }
          #boton-sorteo {
              grid-column: 1 / -1;
          }
          #boton-billetera {
              grid-column: 2;
          }
          #boton-mensajes {
              grid-column: 2;
          }
      }
      @media (max-width: 768px) {
          #menu-buttons {
              grid-template-columns: 1fr;
          }
          .menu-imagen,
          #boton-sorteo {
              width: clamp(200px, 70vw, 380px);
          }
          #boton-jugar,
          #boton-billetera,
          #boton-perfil,
          #boton-mensajes {
              grid-column: 1;
          }
      }
      .modal-whatsapp {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.6);
          display: none;
          align-items: center;
          justify-content: center;
          padding: 20px;
          z-index: 2000;
      }
      .modal-whatsapp.activa {
          display: flex;
      }
      .modal-whatsapp .modal-contenido {
          background: #ffffff;
          border-radius: 18px;
          padding: clamp(20px, 4vw, 36px);
          max-width: 420px;
          width: 100%;
          box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
          text-align: center;
          border: 4px solid #ffd700;
      }
      .modal-whatsapp .modal-contenido h2 {
          font-family: 'Bangers', cursive;
          font-size: clamp(1.4rem, 3vw, 2rem);
          color: #0056ff;
          margin-bottom: clamp(12px, 3vh, 24px);
          text-shadow: 0 0 6px rgba(255, 215, 0, 0.9);
      }
      .modal-whatsapp .modal-mensaje {
          font-size: clamp(0.95rem, 2.4vw, 1.2rem);
          color: #333;
          margin-bottom: clamp(16px, 3vh, 28px);
      }
      #modal-whatsapp-aceptar {
          font-family: 'Bangers', cursive;
          font-size: clamp(1rem, 2.2vw, 1.2rem);
          background: linear-gradient(135deg, #0a8800, #51c94d);
          color: #fff;
          border: 3px solid #ffd700;
          border-radius: 10px;
          padding: 10px 24px;
          cursor: pointer;
          text-transform: uppercase;
          box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
      }
      #modal-whatsapp-aceptar:hover,
      #modal-whatsapp-aceptar:focus {
          transform: scale(1.03);
          outline: none;
          box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
      }
  </style>
</head>
<body>
  <div id="terms-container" style="display:none;">
    <h2>Términos y Condiciones</h2>
    <p>Al usar esta aplicación aceptas las reglas del juego.</p>
    <button id="close-terms-btn" class="back-btn">&#9664; Volver</button>
  </div>

  <div id="register-container" style="display:none;">
    <h2>Registro de Jugador</h2>
    <input id="alias-registro" placeholder="Alias" style="font-size:1rem;padding:5px;text-align:center;"/>
    <button id="registrar-btn">Registrar</button>
  </div>

  <div id="session-info">
      <div id="user-data">
        <div id="user-name"></div>
        <div id="user-email"></div>
      </div>
      <img id="user-pic" referrerpolicy="no-referrer" crossorigin="anonymous" src="" alt="Usuario" style="width:40px;height:40px;border-radius:50%;">
      <a id="logout-link" href="#">Cerrar sesión</a>
  </div>
  <button id="salir-super-btn" class="menu-btn back-btn" style="display:none;">Salir</button>

  <div id="main-menu" class="view">
    <div id="menu-buttons">
      <img id="menu-logo" src="img/Logo-BingOnline-nuevo500p.png" alt="Logo de BingOnline" />
      <h3>Menú Jugador</h3>
      <img id="boton-jugar" class="menu-imagen" src="img/boton-jugar-carton-bingo-300p.png" alt="Ir a jugar cartón" role="button" tabindex="0" loading="lazy" />
      <img id="boton-sorteo" class="menu-imagen" src="img/boton-sorteo-en-vivo400p.png" alt="Ir al sorteo en vivo" role="button" tabindex="0" />
      <img id="boton-billetera" class="menu-imagen" src="img/boton-billetera300p.png" alt="Ir a la billetera" role="button" tabindex="0" loading="lazy" />
      <img id="boton-perfil" class="menu-imagen" src="img/boton-perfiles300p.png" alt="Ir al perfil del jugador" role="button" tabindex="0" loading="lazy" />
      <img id="boton-mensajes" class="menu-imagen" src="img/boton-mensajes300p.png" alt="Abrir el grupo de WhatsApp" role="button" tabindex="0" loading="lazy" />
    </div>
  </div>



  <div id="login-footer">
    <div id="fecha-hora"></div>
    <div id="derechos">Todos los derechos reservados ® Hexaservice 2025</div>
  </div>

  <!-- Importar el SDK de Firebase (compatibilidad para evitar problemas de CORS al abrir el archivo localmente) -->
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
  <div id="modal-whatsapp" class="modal-whatsapp" role="dialog" aria-modal="true" aria-labelledby="modal-whatsapp-titulo" aria-hidden="true">
    <div class="modal-contenido">
      <h2 id="modal-whatsapp-titulo">GRUPO DE WHATSAPP NO DISPONIBLE</h2>
      <p id="modal-whatsapp-mensaje" class="modal-mensaje">Aún no hay grupos disponibles de WhatsApp</p>
      <button type="button" id="modal-whatsapp-aceptar">Aceptar</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/timezone.js"></script>
<script>
ensureAuth();
setupSuperadminExit('#salir-super-btn');
initFechaHora('fecha-hora');

const db = firebase.firestore();
let whatsappLinkValor = '';
let whatsappLinkCargado = false;

const whatsappModalEl = document.getElementById('modal-whatsapp');
const whatsappModalMensajeEl = document.getElementById('modal-whatsapp-mensaje');
const whatsappModalAceptarBtn = document.getElementById('modal-whatsapp-aceptar');

function configurarAccionImagen(id, accion){
  const elemento = document.getElementById(id);
  if(!elemento) return;
  const ejecutarAccion = ()=>accion();
  elemento.addEventListener('click', ejecutarAccion);
  elemento.addEventListener('keydown', evento=>{
    if(evento.key === 'Enter' || evento.key === ' '){
      evento.preventDefault();
      ejecutarAccion();
    }
  });
}

function mostrarModalWhatsapp(texto){
  if(!whatsappModalEl) return;
  if(whatsappModalMensajeEl){
    whatsappModalMensajeEl.textContent = texto || 'Aún no hay grupos disponibles de WhatsApp';
  }
  whatsappModalEl.classList.add('activa');
  whatsappModalEl.setAttribute('aria-hidden','false');
}

function cerrarModalWhatsapp(){
  if(!whatsappModalEl) return;
  whatsappModalEl.classList.remove('activa');
  whatsappModalEl.setAttribute('aria-hidden','true');
}

async function obtenerLinkWhatsapp(){
  if(whatsappLinkCargado) return whatsappLinkValor;
  try {
    const doc = await db.collection('Variablesglobales').doc('Parametros').get();
    const data = doc.exists ? (doc.data() || {}) : {};
    const posibles = [data.linkwhatsapp, data.linkWhatsapp, data.link_whatsapp];
    const enlace = posibles.find(valor => typeof valor === 'string' && valor.trim());
    whatsappLinkValor = enlace ? enlace.trim() : '';
  } catch (error) {
    console.error('Error al obtener el enlace de WhatsApp:', error);
    whatsappLinkValor = '';
  }
  whatsappLinkCargado = true;
  return whatsappLinkValor;
}

async function manejarClickWhatsapp(){
  const enlace = await obtenerLinkWhatsapp();
  if(enlace){
    const nuevaVentana = window.open(enlace, '_blank', 'noopener');
    if(!nuevaVentana){
      mostrarModalWhatsapp('No pudimos abrir el grupo de WhatsApp. Verifica que el navegador permita ventanas emergentes.');
    }
  } else {
    mostrarModalWhatsapp('Aún no hay grupos disponibles de WhatsApp');
  }
}

configurarAccionImagen('boton-jugar', ()=>{window.location.href = 'jugarcartones.html';});
configurarAccionImagen('boton-sorteo', ()=>{window.location.href = 'juegoactivo.html';});
configurarAccionImagen('boton-billetera', ()=>{window.location.href = 'billetera.html';});
configurarAccionImagen('boton-perfil', ()=>{window.location.href = 'perfil.html';});
configurarAccionImagen('boton-mensajes', manejarClickWhatsapp);

if(whatsappModalAceptarBtn){
  whatsappModalAceptarBtn.addEventListener('click', cerrarModalWhatsapp);
}
if(whatsappModalEl){
  whatsappModalEl.addEventListener('click', evento=>{
    if(evento.target === whatsappModalEl){
      cerrarModalWhatsapp();
    }
  });
}
</script>
</body>
</html>
